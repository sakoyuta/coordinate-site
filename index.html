function FacadePresentation({cart, activeCustomer}) {
  const custId = activeCustomer?.id || 'default';
  const custName = activeCustomer
    ? activeCustomer.name1 + (activeCustomer.name2 ? ` / ${activeCustomer.name2}` : '') : '';
  const [data, setData] = React.useState(() => loadFacadeData(custId));
  const [editingFloors, setEditingFloors] = React.useState(false);
  const [editMode,  setEditMode]  = React.useState(false);
  const [saveMsg,   setSaveMsg]   = React.useState('');
  const [undoStack, setUndoStack] = React.useState([]);
  const [redoStack, setRedoStack] = React.useState([]);
  const dataRef = React.useRef(data);
  React.useEffect(() => { dataRef.current = data; }, [data]);
  const [roomOpts, setRoomOpts] = React.useState(() => loadRoomOpts());
  const [showRoomOpts, setShowRoomOpts] = React.useState(false);
  const tabRef = React.useRef(null);
  const pageRef = React.useRef(null);

  React.useEffect(() => {
    const applyScale = () => {
      if (!tabRef.current || !pageRef.current) return;
      const tabW = tabRef.current.clientWidth;
      const pageW = pageRef.current.scrollWidth;
      if (!pageW) return;
      const s = Math.min(1, (tabW - 24) / pageW);
      const pageH = pageRef.current.scrollHeight;
      pageRef.current.style.transform = `scale(${s})`;
      pageRef.current.style.transformOrigin = 'top center';
      pageRef.current.style.marginBottom = `${Math.round((s - 1) * pageH)}px`;
    };
    const tid = setTimeout(applyScale, 80);
    window.addEventListener('resize', applyScale);
    return () => { clearTimeout(tid); window.removeEventListener('resize', applyScale); };
  }, [data.floors]);

  const save = React.useCallback((key, val) => {
    setUndoStack(prev => [...prev.slice(-49), dataRef.current]);
    setRedoStack([]);
    setData(p => { const n = {...p, [key]: val}; saveFacadeData(custId, n); return n; });
  }, [custId]);

  const handleFacadeUndo = React.useCallback(() => {
    setUndoStack(prev => {
      if (prev.length === 0) return prev;
      const prevState = prev[prev.length - 1];
      setRedoStack(r => [...r.slice(-49), dataRef.current]);
      setData(prevState); saveFacadeData(custId, prevState);
      return prev.slice(0, -1);
    });
  }, [custId]);

  const handleFacadeRedo = React.useCallback(() => {
    setRedoStack(prev => {
      if (prev.length === 0) return prev;
      const nextState = prev[prev.length - 1];
      setUndoStack(u => [...u.slice(-49), dataRef.current]);
      setData(nextState); saveFacadeData(custId, nextState);
      return prev.slice(0, -1);
    });
  }, [custId]);

  const wallItems = React.useMemo(() => cart.filter(s => WALL_CATS.includes(s.product.cat)), [cart]);
  const getCartItem = React.useCallback((slot) => {
    if (slot.wallIdx !== undefined) return wallItems[slot.wallIdx] || null;
    if (!slot.cats?.length) return null;
    return cart.find(s => slot.cats.includes(s.product.cat) &&
      (!slot.nameKeys?.length || slot.nameKeys.some(k => s.product.name.includes(k)))
    ) || cart.find(s => slot.cats.includes(s.product.cat)) || null;
  }, [cart, wallItems]);

  // Editable cell (read-only unless editMode is active)
  function FCell({fkey, def}) {
    const init = fkey in data ? data[fkey] : (def || '');
    if (!editMode) {
      return <span style={{display:'block',padding:'2px 4px',minHeight:'12px',fontSize:'7pt',lineHeight:'1.45',wordBreak:'break-all'}}>{init}</span>;
    }
    return (
      <span className="facade-cell"
        contentEditable suppressContentEditableWarning
        onBlur={e => save(fkey, e.currentTarget.innerText)}
        dangerouslySetInnerHTML={{__html: init}}
      />
    );
  }

  const floors = data.floors;

  // ── Row/slot management helpers ──
  function getDataArr(key) { try { return JSON.parse(data[key] || '[]'); } catch { return []; } }
  function saveArr(key, arr) { save(key, JSON.stringify(arr)); }

  function getRoomList(f) {
    const rk = `d${f}F_rk`;
    if (rk in data) return getDataArr(rk);
    return (FLOOR_ROOM_PRESETS[f] || []).map((_, i) => `r${i}`);
  }
  function addRoom(f) {
    const list = getRoomList(f);
    saveArr(`d${f}F_rk`, [...list, 'rx'+Date.now()]);
  }
  function delRoom(f, rk) {
    saveArr(`d${f}F_rk`, getRoomList(f).filter(k => k !== rk));
  }
  function getVisibleSlots(tableKey, stdSlots) {
    const hidden = getDataArr(tableKey+'_hide');
    const extra = getDataArr(tableKey+'_xtra');
    return [...stdSlots.filter(s => !hidden.includes(s.id)), ...extra.map(e => ({...e, isExtra:true}))];
  }
  function addSlotRow(tableKey) {
    const extra = getDataArr(tableKey+'_xtra');
    saveArr(tableKey+'_xtra', [...extra, {id: tableKey+'_e'+Date.now(), label:''}]);
  }
  function delSlotRow(tableKey, slot) {
    if (slot.isExtra) {
      saveArr(tableKey+'_xtra', getDataArr(tableKey+'_xtra').filter(e => e.id !== slot.id));
    } else {
      const hidden = getDataArr(tableKey+'_hide');
      if (!hidden.includes(slot.id)) saveArr(tableKey+'_hide', [...hidden, slot.id]);
    }
  }

  // shared button styles for add/delete in edit mode
  const delBtnSt = {width:16,height:16,padding:0,border:'none',background:'transparent',color:'#e74c3c',cursor:'pointer',fontSize:12,lineHeight:'16px',fontWeight:700,flexShrink:0};
  const addRowSt = {width:'100%',padding:'3px',border:'1px dashed #90b8e8',background:'transparent',color:'#2471d4',cursor:'pointer',fontSize:'10px',borderRadius:3,marginTop:'2px'};

  // ── FACADE header block (reused per page in print) ──
  function FacadeHeader() {
    return (
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',
        borderBottom:'3px solid #1a2332',marginBottom:'3mm',paddingBottom:'1.5mm'}}>
        <div>
          <div style={{fontSize:'18pt',fontWeight:900,letterSpacing:'3px',color:'#1a2332',
            lineHeight:1,fontFamily:'Arial,sans-serif'}}>FACADE</div>
          <div style={{fontSize:'7pt',color:'#666',marginTop:'1mm',letterSpacing:'1px'}}>外観仕様</div>
        </div>
        <div style={{textAlign:'right'}}>
          {custName && <div style={{fontSize:'9pt',fontWeight:700,color:'#1a2332'}}>{custName} 様邸</div>}
          {activeCustomer?.address && <div style={{fontSize:'7pt',color:'#555',marginTop:'1mm'}}>{activeCustomer.address}</div>}
        </div>
      </div>
    );
  }

  // ── 各階 DETAIL JSX（左右どちらのカラムにも使い回す） ──
  function renderFloorDetail(f) {
    const roomList = getRoomList(f);
    const detailKey = `d${f}F`;
    const visibleDetails = getVisibleSlots(detailKey, DETAIL_SLOTS);
    return (
      <div>
        {/* DETAIL ヘッダー */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',
          borderBottom:'2.5px solid #2471d4',marginBottom:'2.5mm',paddingBottom:'1.5mm'}}>
          <div>
            <div style={{fontSize:'16pt',fontWeight:900,letterSpacing:'2px',color:'#2471d4',
              lineHeight:1,fontFamily:'Arial,sans-serif'}}>DETAIL</div>
            <div style={{fontSize:'7pt',color:'#2471d4',marginTop:'0.5mm',letterSpacing:'1px'}}>{f}F 内装仕様</div>
          </div>
        </div>

        {/* ① 床材・壁紙テーブル */}
        <div style={{fontSize:'6.5pt',fontWeight:700,color:'#2471d4',marginBottom:'1mm',letterSpacing:'0.5px'}}>▎ 床材・壁紙</div>
        <table className="facade-tbl detail-tbl" style={{marginBottom:'3mm'}}>
          <thead>
            <tr>
              {editMode && <th style={{width:16}}></th>}

              <th style={{width:'36mm'}}>床材（メーカー・品番）</th>
              <th style={{width:'20mm'}}>カラー</th>
              <th style={{width:'24mm'}}>クロス（壁）</th>
              <th style={{width:'20mm'}}>クロス（天井）</th>
              <th style={{width:'20mm'}}>アクセントA</th>
              <th>アクセントB</th>
            </tr>
          </thead>
          <tbody>
            {roomList.map((rk, ri) => {
              const pfx = `d${f}F_${rk}`;
              const preset = rk.startsWith('rx') ? '' : (FLOOR_ROOM_PRESETS[f]?.[parseInt(rk.slice(1))] || '');
              const currentName = (pfx+'_nm') in data ? data[pfx+'_nm'] : preset;
              return (
                <tr key={rk}>
                  {editMode && (
                    <td style={{width:16,padding:'0 1px',textAlign:'center',verticalAlign:'middle'}}>
                      <button onClick={() => delRoom(f, rk)} style={delBtnSt}>×</button>
                    </td>
                  )}
                  <td style={{background:'#dbeafe',padding:0}}>
                    {editMode ? (
                      <select value={currentName}
                        onChange={e => save(pfx+'_nm', e.target.value)}
                        style={{width:'100%',fontSize:'7pt',border:'none',background:'#dbeafe',
                          cursor:'pointer',padding:'2px 4px',height:'100%'}}>
                        {roomOpts.map(o => <option key={o} value={o}>{o || '（空白）'}</option>)}
                        {currentName && !roomOpts.includes(currentName) && <option value={currentName}>{currentName}</option>}
                      </select>
                    ) : (
                      <span style={{display:'block',padding:'2px 4px',fontSize:'7pt'}}>{currentName}</span>
                    )}
                  </td>
                  <td><FCell fkey={pfx+'_fl'} def=""/></td>
                  <td><FCell fkey={pfx+'_fc'} def=""/></td>
                  <td><FCell fkey={pfx+'_cw'} def=""/></td>
                  <td><FCell fkey={pfx+'_ct'} def=""/></td>
                  <td><FCell fkey={pfx+'_ca'} def=""/></td>
                  <td><FCell fkey={pfx+'_cb'} def=""/></td>
                </tr>

            {editMode && (
              <tr><td colSpan={9}><button onClick={() => addRoom(f)} style={addRowSt}>＋ 部屋を追加</button></td></tr>
            )}
          </tbody>
        </table>

        {/* ② 内装部品テーブル */}
        <div style={{fontSize:'6.5pt',fontWeight:700,color:'#2471d4',marginBottom:'1mm',letterSpacing:'0.5px'}}>▎ 内装部品</div>
        <table className="facade-tbl detail-tbl">
          <thead>
            <tr>
              {editMode && <th style={{width:16}}></th>}
              <th className="td-no">No.</th>
              <th style={{width:'26mm',padding:'2px 4px',textAlign:'left'}}>項目</th>
              <th style={{width:'32mm',padding:'2px 4px',textAlign:'left'}}>メーカー</th>
              <th style={{width:'40mm',padding:'2px 4px',textAlign:'left'}}>品番・型番</th>
              <th style={{width:'24mm',padding:'2px 4px',textAlign:'left'}}>カラー</th>
              <th style={{padding:'2px 4px',textAlign:'left'}}>備考</th>
            </tr>
          </thead>
          <tbody>
            {visibleDetails.map((slot, i) => (
              <tr key={slot.id}>
                {editMode && (
                  <td style={{width:16,padding:'0 1px',textAlign:'center',verticalAlign:'middle'}}>
                    <button onClick={() => delSlotRow(detailKey, slot)} style={delBtnSt}>×</button>

                <td><FCell fkey={`${detailKey}_${slot.id}_nm`} def=""/></td>
                <td><FCell fkey={`${detailKey}_${slot.id}_cl`} def=""/></td>
                <td><FCell fkey={`${detailKey}_${slot.id}_bk`} def=""/></td>

            {editMode && (
              <tr><td colSpan={7}><button onClick={() => addSlotRow(detailKey)} style={addRowSt}>＋ 項目を追加</button></td></tr>

  }

  return (
    <div className="spec-tab" ref={tabRef}>

      {/* ── 階数選択画面 ── */}
      {(!floors || editingFloors) && (
        <div className="floor-setup">
          <div style={{fontSize:15,fontWeight:700,color:'#1a2332'}}>
            {editingFloors ? '階数を変更する' : '建物の階数を選択してください'}

                border:'1px solid #c5d8f6',borderRadius:4,cursor:'pointer'}}>

            </button>
            {!editMode ? (
              <button onClick={() => setEditMode(true)}
                style={{padding:'5px 16px',fontSize:12,fontWeight:700,background:'#1a2332',color:'#fff',
                  border:'none',borderRadius:6,cursor:'pointer',boxShadow:'0 2px 5px rgba(0,0,0,.18)'}}>
                ✏️ 編集
              </button>
            ) : (
              <>
                <button onClick={() => {
                    document.activeElement?.blur();
                    setEditMode(false);
                    setSaveMsg('保存しました ✓');
                    setTimeout(() => setSaveMsg(''), 2500);
                  }}
                  style={{padding:'5px 16px',fontSize:12,fontWeight:700,background:'var(--green)',color:'#fff',
                    border:'none',borderRadius:6,cursor:'pointer',boxShadow:'0 2px 5px rgba(0,0,0,.18)'}}>
                  💾 保存
                </button>
                <button onClick={() => setShowRoomOpts(true)}
                  style={{padding:'5px 12px',fontSize:12,background:'#e8f0fe',color:'#1a2332',
                    border:'1px solid #c5d8f6',borderRadius:6,cursor:'pointer',fontWeight:600}}>
                  🏠 部屋名リスト
                </button>
                <button onClick={() => { document.activeElement?.blur(); setEditMode(false); }}
                  style={{padding:'5px 12px',fontSize:12,background:'#f0f2f5',color:'#555',
                    border:'1px solid #dde1e7',borderRadius:6,cursor:'pointer'}}>
                  ✕ キャンセル
                </button>
                <span style={{fontSize:11,color:'var(--blue)'}}>編集中 — 各セルをクリックして入力</span>
              </>
            )}
            <button onClick={handleFacadeUndo} disabled={undoStack.length===0} title="一つ戻る"
              style={{padding:'5px 12px',fontSize:12,fontWeight:700,borderRadius:6,
                border:'1px solid #dde1e7',cursor:undoStack.length?'pointer':'default',
                background:undoStack.length?'#f0f2f5':'#f8f9fa',
                color:undoStack.length?'#2c3e50':'#bbb'}}>
              ← 戻る
            </button>
            <button onClick={handleFacadeRedo} disabled={redoStack.length===0} title="一つ進む"
              style={{padding:'5px 12px',fontSize:12,fontWeight:700,borderRadius:6,
                border:'1px solid #dde1e7',cursor:redoStack.length?'pointer':'default',
                background:redoStack.length?'#f0f2f5':'#f8f9fa',
                color:redoStack.length?'#2c3e50':'#bbb'}}>
              進む →
            </button>
            {saveMsg && <span style={{fontSize:12,color:'var(--green)',fontWeight:700}}>{saveMsg}</span>}
          </div>

          {showRoomOpts && (
            <RoomOptsModal
              opts={roomOpts}
              onSave={opts => { saveRoomOpts(opts); setRoomOpts(opts); }}
              onClose={() => setShowRoomOpts(false)}
            />
          )}

          {/* ── ページラッパー（スケール対象） ── */}
          <div ref={pageRef} className="facade-pages-wrap" style={{display:'inline-block'}}>

            {/* ════ ページ１：FACADE＋NAISOU（左）／1F（右） ════ */}
            <div className="facade-a3">
              {/* 左列：FACADE 外装 ＋ NAISOU 内装（全階共通） */}
              <div className="facade-col-left">
                <FacadeHeader/>
                <table className="facade-tbl">
                  <thead>
                    <tr>
                      {editMode && <th style={{width:16}}></th>}
                      <th className="td-no">No.</th>
                      <th style={{width:'26mm',padding:'2px 4px',textAlign:'left'}}>項目</th>
                      <th style={{width:'32mm',padding:'2px 4px',textAlign:'left'}}>メーカー</th>
                      <th style={{width:'44mm',padding:'2px 4px',textAlign:'left'}}>品番・型番</th>
                      <th style={{width:'25mm',padding:'2px 4px',textAlign:'left'}}>カラー</th>
                      <th style={{padding:'2px 4px',textAlign:'left'}}>備考</th>
                    </tr>
                  </thead>
                  <tbody>
                    {getVisibleSlots('facade', FACADE_SLOTS).map((slot, i) => {
                      const item = slot.isExtra ? null : getCartItem(slot);
                      const p = item?.product;
                      const autoMaker = p?.maker || '';
                      const autoName  = p?.name  || '';
                      const autoColor = item ? (item.selectedColors||[]).join('・') || (p?.colors?.[0]||'') : '';
                      return (
                        <tr key={slot.id}>
                          {editMode && <td style={{width:16,padding:'0 1px',textAlign:'center',verticalAlign:'middle'}}><button onClick={() => delSlotRow('facade', slot)} style={delBtnSt}>×</button></td>}
                          <td className="td-no">{i + 1}</td>
                          <td className="td-label">{slot.isExtra ? <FCell fkey={slot.id+'_label'} def="（項目名）"/> : slot.label}</td>
                          <td><FCell fkey={slot.id+'_maker'} def={autoMaker}/></td>
                          <td><FCell fkey={slot.id+'_name'}  def={autoName}/></td>
                          <td><FCell fkey={slot.id+'_color'} def={autoColor}/></td>
                          <td><FCell fkey={slot.id+'_biko'}  def=""/></td>
                        </tr>
                      );
                    })}
                    {editMode && (
                      <tr><td colSpan={7}><button onClick={() => addSlotRow('facade')} style={addRowSt}>＋ 項目を追加</button></td></tr>
                    )}
                  </tbody>
                </table>

                {/* ── 内装仕様（全階共通） ── */}
                <div style={{marginTop:'4mm',paddingTop:'3mm',borderTop:'2.5px solid #2471d4'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',
                    borderBottom:'2px solid #2471d4',marginBottom:'2.5mm',paddingBottom:'1.5mm'}}>
                    <div>
                      <div style={{fontSize:'14pt',fontWeight:900,letterSpacing:'2px',color:'#2471d4',
                        lineHeight:1,fontFamily:'Arial,sans-serif'}}>DETAIL</div>
                      <div style={{fontSize:'6.5pt',color:'#2471d4',marginTop:'0.5mm',letterSpacing:'1px'}}>内装仕様（全階共通）</div>
                    </div>
                  </div>
                  <table className="facade-tbl detail-tbl">
                    <thead>
                      <tr>
                        {editMode && <th style={{width:16}}></th>}
                        <th className="td-no">No.</th>
                        <th style={{width:'26mm',padding:'2px 4px',textAlign:'left'}}>項目</th>
                        <th style={{width:'32mm',padding:'2px 4px',textAlign:'left'}}>メーカー</th>
                        <th style={{width:'44mm',padding:'2px 4px',textAlign:'left'}}>品番・型番</th>
                        <th style={{width:'25mm',padding:'2px 4px',textAlign:'left'}}>カラー</th>
                        <th style={{padding:'2px 4px',textAlign:'left'}}>備考</th>
                      </tr>
                    </thead>
                    <tbody>
                      {getVisibleSlots('naisou', NAISOU_SLOTS).map((slot, i) => (
                        <tr key={slot.id}>
                          {editMode && <td style={{width:16,padding:'0 1px',textAlign:'center',verticalAlign:'middle'}}><button onClick={() => delSlotRow('naisou', slot)} style={delBtnSt}>×</button></td>}
                          <td className="td-no">{i + 1}</td>
                          <td className="td-label">{slot.isExtra ? <FCell fkey={slot.id+'_label'} def="（項目名）"/> : slot.label}</td>
                          <td><FCell fkey={slot.id+'_maker'} def=""/></td>
                          <td><FCell fkey={slot.id+'_name'}  def=""/></td>
                          <td><FCell fkey={slot.id+'_color'} def=""/></td>
                          <td><FCell fkey={slot.id+'_biko'}  def=""/></td>
                        </tr>
                      ))}
                      {editMode && (
                        <tr><td colSpan={7}><button onClick={() => addSlotRow('naisou')} style={addRowSt}>＋ 項目を追加</button></td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* 右列：1F DETAIL */}
              <div className="facade-col-right">
                {floors >= 1 && renderFloorDetail(1)}
              </div>
            </div>

            {/* ════ ページ２：2F（左）／3F（右）— 2F以上の場合のみ ════ */}
            {floors >= 2 && (
              <div className="facade-a3">
                <div className="facade-col-left">
                  {renderFloorDetail(2)}
                </div>
                <div className="facade-col-right">
                  {floors >= 3 ? renderFloorDetail(3) : null}
                </div>
              </div>
            )}
          </div>
        </>
      )}
    </div>
  );
}

// ===== SPEC EDITABLE COMPONENTS =====
const SpecCell = React.memo(function SpecCell({id,def,colSpan,cls,onEdit}) {
  const saved = React.useContext(SpecEditsCtx);
  const editMode = React.useContext(SpecEditModeCtx);
  const val = id in saved ? saved[id] : (def||'');
  if (!editMode) return (
    <td colSpan={colSpan||1} className={cls||''}
      style={{border:'0.5px solid #bbb',padding:'1.5px 3px',verticalAlign:'middle',fontSize:'6.5pt'}}>
      {val}
    </td>
  );
  return (
    <td colSpan={colSpan||1} className={(cls||'')+' spec-editable-cell'}
      data-spec-id={id}
      contentEditable suppressContentEditableWarning
      onBlur={e=>onEdit(id,e.currentTarget.innerText)}
      dangerouslySetInnerHTML={{__html: val}}
    />
  );
},()=>true);

const SpecBiko = React.memo(function SpecBiko({id,rowSpan,onEdit}) {
  const saved = React.useContext(SpecEditsCtx);
  const editMode = React.useContext(SpecEditModeCtx);
  const val = saved[id] || '';
  if (!editMode) return (
    <td rowSpan={rowSpan||1} className="spec-biko">{val}</td>
  );
  return (
    <td rowSpan={rowSpan||1} className="spec-biko"
      data-spec-id={id}
      contentEditable suppressContentEditableWarning
      onBlur={e=>onEdit(id,e.currentTarget.innerText)}
      dangerouslySetInnerHTML={{__html: val}}
    />
  );
},()=>true);

const SpecSelect = React.memo(function SpecSelect({id, def, onEdit, opts, colSpan, style}) {
  const saved = React.useContext(SpecEditsCtx);
  const editMode = React.useContext(SpecEditModeCtx);
  const initVal = id in saved ? saved[id] : (def || '');
  const options = opts || ['', '有', '無'];
  if (!editMode) return (
    <td colSpan={colSpan||1}
      style={{border:'0.5px solid #bbb',padding:'1.5px 3px',verticalAlign:'middle',textAlign:'center',fontSize:'6.5pt',...style}}>
      {initVal || '－'}
    </td>
  );
  return (
    <td colSpan={colSpan||1} data-spec-id={id}
      style={{border:'0.5px solid #bbb', padding:'0', verticalAlign:'middle', textAlign:'left', ...style}}>
      <select
        defaultValue={initVal}
        onChange={e => onEdit(id, e.target.value)}
        style={{width:'100%', fontSize:'6pt', border:'none', background:'transparent',
                cursor:'pointer', padding:'1px 2px', textAlign:'left',
                fontWeight: initVal ? 700 : 400,
                color: initVal ? '#1a2332' : '#888'}}
      >
        {options.map(o => <option key={o} value={o}>{o || '－'}</option>)}
      </select>
    </td>
  );
},()=>true);

// ===== SETTINGS PANEL =====
function SettingsPanel({onClose}) {
  const [usage, setUsage] = React.useState(0);
  const [msg, setMsg] = React.useState('');
  React.useEffect(() => { setUsage(getStorageUsage()); }, []);

  const MB = (usage / 1024 / 1024).toFixed(2);
  const pct = Math.min(100, Math.round(usage / (5 * 1024 * 1024) * 100));
  const color = pct > 80 ? '#e53e3e' : pct > 60 ? '#dd6b20' : '#38a169';

  function handleExport() { exportAllData(); setMsg('エクスポート完了'); setTimeout(()=>setMsg(''),2500); }

  return (
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="settings-panel">
        <div className="settings-title">⚙️ 設定</div>

        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',marginBottom:4}}>ストレージ使用量</div>
          <div className="settings-storage-bar">
            <div className="settings-storage-fill" style={{width:pct+'%',background:color}}/>
          </div>
          <div style={{fontSize:12,color}}>
            {MB} MB / 5 MB ({pct}%)
            {pct > 70 && <span style={{marginLeft:8,fontWeight:700}}>⚠ 容量が逼迫しています</span>}
          </div>
        </div>

        <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',marginBottom:8}}>データ管理</div>
        <div className="settings-btn-row">
          <button onClick={handleExport}
            style={{flex:1,padding:'8px',fontSize:'12px',background:'#4a90d9',color:'#fff',border:'none',
              borderRadius:'6px',cursor:'pointer',fontWeight:700}}>📤 エクスポート</button>
          <label style={{flex:1,padding:'8px',fontSize:'12px',background:'#68d391',color:'#1a4731',
              borderRadius:'6px',cursor:'pointer',fontWeight:700,textAlign:'center',display:'block'}}>
            📥 インポート<input type="file" accept=".json" style={{display:'none'}}
              onChange={e=>{const f=e.target.files[0];if(!f)return;importAllData(f,ok=>{
                setMsg(ok?'インポート完了。ページを再読込してください。':'エラー：ファイルが無効です');
                setUsage(getStorageUsage());setTimeout(()=>setMsg(''),4000);
              });e.target.value='';}}/>
          </label>
        </div>
        {msg && <div style={{marginTop:10,fontSize:12,color:msg.includes('エラー')?'#e53e3e':'#38a169',fontWeight:700}}>{msg}</div>}

        <div style={{marginTop:20,textAlign:'right'}}>
          <button onClick={onClose} className="btn-secondary">閉じる</button>
        </div>
      </div>
    </div>
  );
}

// ===== ROOM OPTIONS MODAL =====
function RoomOptsModal({opts, onSave, onClose}) {
  const [list, setList] = React.useState(opts.filter(o => o !== ''));
  const [inputVal, setInputVal] = React.useState('');
  function addOpt() {
    const v = inputVal.trim();
    if (v && !list.includes(v)) { setList(l => [...l, v]); setInputVal(''); }
  }
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:9999,
      display:'flex',alignItems:'center',justifyContent:'center'}}
      onClick={e => { if (e.target===e.currentTarget) onClose(); }}>
      <div style={{background:'#fff',borderRadius:10,padding:20,width:360,
        display:'flex',flexDirection:'column',gap:12,boxShadow:'0 8px 32px rgba(0,0,0,.2)'}}>
        <div style={{fontWeight:700,fontSize:15,color:'#1a2332'}}>🏠 部屋名リスト編集</div>
        <div style={{overflowY:'auto',maxHeight:300,border:'1px solid #e2e8f0',borderRadius:6,padding:8}}>
          {list.map((opt, i) => (
            <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',borderBottom:'1px solid #f0f2f5'}}>
              <span style={{flex:1,fontSize:13}}>{opt}</span>
              <button onClick={() => setList(l => l.filter((_,j) => j!==i))}
                style={{width:22,height:22,border:'none',background:'#fee2e2',color:'#e53e3e',

// ===== 日付ユーティリティ（グローバル定義） =====
function addDays(dateStr, days) {
  if (!dateStr) return '';
  const parts = dateStr.split('-').map(Number);
  if (parts.length !== 3 || parts.some(isNaN)) return '';
  // ローカル時刻でDate生成（タイムゾーンズレ防止）
  const d = new Date(parts[0], parts[1] - 1, parts[2]);
  d.setDate(d.getDate() + days);
  return [
    d.getFullYear(),
    String(d.getMonth() + 1).padStart(2, '0'),
    String(d.getDate()).padStart(2, '0'),
  ].join('-');
}
function calcScheduleDates(tochiKeiyakuDate) {
  const tochi    = tochiKeiyakuDate;
  const tatemo   = addDays(tochi, 60);      // 建物契約 = 土地契約+60
  const kessai   = addDays(tochi, 60);      // 土地決済 = 土地契約+60
  const hearing  = addDays(tatemo, 7);      // 初回間取ヒアリング = 建物契約+7
  const madori   = addDays(hearing, 40);    // 間取確定 = ヒアリング+40
  const yoshiki  = addDays(madori, 50);     // 仕様最終打合せ = 間取確定+50
  const henko    = addDays(yoshiki, 30);    // 変更契約 = 仕様+30
  const shunkou  = addDays(henko, 7);       // 着工 = 変更契約+7
  const joto     = addDays(shunkou, 40);    // 上棟 = 着工+40
  const kanryo   = addDays(joto, 120);      // 竣工 = 上棟+120
  const saishu   = addDays(kanryo, 14);     // 最終金 = 竣工+14
  const ohikoshi = addDays(saishu, 14);     // お引越し = 最終金+14
  return {
    tatemonoKeiyakuDate: tatemo,
    tochiKessaiDate:     kessai,
    madoriHearingDate:   hearing,
    madoriKakuteiDate:   madori,
    yoshikiUchiDate:     yoshiki,
    henkoKeiyakuDate:    henko,
    shunkouDate:         shunkou,
    jotoDate:            joto,
    shunkouKanryoDate:   kanryo,
    saishuDate:          saishu,
    ohikoshiDate:        ohikoshi,
  };
}

// ===== コンマ付き数値入力コンポーネント（グローバル定義） =====
function addCommas(v) {
  const s = String(v||'').replace(/,/g,'');
  if(s==='' || isNaN(Number(s))) return s;
  const parts = s.split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return parts.join('.');
}
function NumInp({value, onChange, placeholder, style, left}) {
  const [editing, setEditing] = React.useState(false);
  const [raw, setRaw] = React.useState('');
  const handleFocus = () => { setEditing(true); setRaw(String(value||'').replace(/,/g,'')); };
  const handleChange = (e) => { const v=e.target.value.replace(/,/g,''); setRaw(v); onChange(v); };
  const handleBlur  = () => setEditing(false);
  return (
    <input
      className={`fin-inp${left?' fin-inp-left':''}`}
      value={editing ? raw : addCommas(value)}
      placeholder={placeholder||'0'}
      style={style}
      onFocus={handleFocus}
      onChange={handleChange}
      onBlur={handleBlur}
    />
  );
}

      const kanryo   = addDays(joto, 120);
      const saishu   = addDays(kanryo, 14);

  const op3Total = (fin.op3items||[]).reduce((s,it)=>it.sel==='有'?s+n(it.price):s, 0);  // ③ 付帯工事費用B

  const koujiTotal = tsuboAmt + op2Total + op3Total + op4Total;  // 工事費合計

  const updateLoanPlan = (idx, key, val) => {

    const arr = Array.from({length:len}, (_,i)=>(fin[arrKey]||[])[i]||empty);
    arr[idx] = {...arr[idx], [key]: val};
    saveArr(arrKey, arr);
  };

  const op5Total = (fin.op5items||[]).reduce((s,it)=>s+n(it.amt),0);  // ⑤ 諸費用
  const op6Total = (fin.op6items||[]).reduce((s,it)=>s+n(it.amt),0);  // ⑥ 土地費用
  const tochiTotal = op6Total;  // 資金サマリー互換
  const grandTotal = koujiTotal * 1.1 + op5Total + op6Total;  // 最終合計（税込）
  const sogoTotal = grandTotal;

  // 工事請負金分割

  const tezukinR = n(fin.tezukinRate) || 5;
  const chakkoR  = n(fin.chakkoRate)  || 30;
  const chukanR  = n(fin.chukanRate)  || 30;
  const zankinR  = Math.max(0, 100 - tezukinR - chakkoR - chukanR);
  const tezukinAmt = koujiTotal * tezukinR / 100;
  const chakkoAmt  = koujiTotal * chakkoR  / 100;
  const chukanAmt  = koujiTotal * chukanR  / 100;
  const zankinAmt  = koujiTotal * zankinR  / 100;

  // つなぎ融資利息（①→着工金自動反映、②→中間金自動反映）
  const tsunagi1UseAmt = chakkoAmt || 0;
  const tsunagi2UseAmt = chukanAmt || 0;

  const tsunagiTotal = tsunagi1UseAmt + tsunagi2UseAmt;

  // 住宅ローン月々返済

    if (!principal || !annualRate || !years) return 0;
    const r = annualRate / 100 / 12;
    const n2 = years * 12;
    if (r === 0) return principal / n2;
    return principal * r * Math.pow(1+r, n2) / (Math.pow(1+r, n2) - 1);

function KarteTab({activeCustomer}){
  const custId = activeCustomer?.id || 'default';
  const [sub, setSub] = React.useState('flow');
  const [karte, setKarte] = React.useState(()=>loadKarteData(custId));

  const save = React.useCallback((key,val) => {
    setKarte(prev=>{const next={...prev,[key]:val};saveKarteData(custId,next);return next;});
  }, [custId]);
  const saveFamily = React.useCallback((idx,key,val) => {
    setKarte(prev=>{
      const fam=prev.family.map((f,i)=>i===idx?{...f,[key]:val}:f);
      const next={...prev,family:fam};saveKarteData(custId,next);return next;
    });
  }, [custId]);

  // ヘルパー：通常の関数として呼び出す（Reactコンポーネントにしない = 再マウントなし = フォーカス維持）
  const kinp = (k, placeholder, type) => (
    <input className="k-inp" type={type||'text'} value={karte[k]||''} placeholder={placeholder||''} onChange={e=>save(k,e.target.value)}/>
  );
  const kta = (k, placeholder, rows) => (
    <textarea className="k-ta" rows={rows||2} value={karte[k]||''} placeholder={placeholder||''} onChange={e=>save(k,e.target.value)}/>
  );
  const f = (label, k, placeholder, type, full) => (
    <div className={`k-field${full?' k-full':''}`}>
      <span className="k-label">{label}</span>
      {kinp(k, placeholder, type)}
    </div>
  );
  const tf = (label, k, placeholder, full, rows) => (
    <div className={`k-field${full?' k-full':''}`}>
      <span className="k-label">{label}</span>
      {kta(k, placeholder, rows)}
    </div>
  );

  const SUBTABS = [
    {id:'flow',label:'📊 商談フロー'},
    {id:'basic',label:'👤 基本情報'},
    {id:'general',label:'🎯 総合ヒアリング'},
    {id:'land',label:'🗺️ 土地エリア精査'},
    {id:'summary',label:'📋 カルテ一覧'},
  ];

  const FLOW_STEPS = [
    {n:'STEP 1',title:'ヒアリングフェーズ（7項目確認）',items:['最寄り駅・通勤時間','家族構成（現在・将来）','現在の住居形態・家賃','家づくりのきっかけ・動機','希望エリア・土地について','建物へのこだわり・要望','資金計画の大枠確認']},
    {n:'STEP 2',title:'月々いくらまで出せるか',items:['「今の家賃と同じくらいで考えていますか？」とヒアリング','現在の固定費（家賃・駐車場・管理費等）を確認','住宅ローンの月々返済イメージを共有','「月々◯万円なら検討できる」というラインを引き出す']},
    {n:'STEP 3',title:'図面＋資金試算の提示',items:['ラフプランを提示しながら資金試算を同時に説明','建物総額→自己資金→借入額→月々返済額の流れで説明','「月々◯万円で実現できます」という結論を先に伝える','競合との差別化ポイントを数字で示す']},
    {n:'STEP 4',title:'月々に落とし込む工夫',items:['頭金の調整（貯金・援助金の活用提案）','ローン年数の延長（35年→40年）','ボーナス払い併用の提案','親からの援助・贈与税非課税制度の活用']},
    {n:'STEP 5',title:'光熱費逆転現象の説明',items:['高気密・高断熱による冷暖房費削減効果を提示','太陽光・V2Hによる売電・自家消費メリット','「家賃＋光熱費」vs「ローン＋光熱費（大幅削減）」の比較','実質負担額が現在より安くなる可能性を数字で説明']},
    {n:'STEP 6',title:'キャンペーン提示タイミング',items:['「実は今月のキャンペーンがあります」と伝えるタイミングを計る','仮契約・申込金のハードルを下げる提案','期限を明示して決断を促す','「今決めることのメリット」を具体的に伝える']},
    {n:'STEP 7',title:'予算が厳しい場合の対応',items:['仕様グレードの見直し（コストダウン箇所の提案）','土地エリアの再考（少し広げてコスト削減）','段階的な工事（外構・造作を引渡し後に）','「諦める前に一緒に考えましょう」というスタンスで寄り添う']},
  ];

  return (

      <div className="karte-subtabs">
        {SUBTABS.map(s=>(
          <button key={s.id} className={`karte-subtab${sub===s.id?' active':''}`} onClick={()=>setSub(s.id)}>{s.label}</button>
        ))}
      </div>
      <div className="karte-body">

        {/* 商談フロー */}
        {sub==='flow' && (
          <div>
            {FLOW_STEPS.map((step,i)=>(
              <div key={i} className="flow-step">
                <div className="flow-step-hdr">
                  <span style={{background:'#c8a84b',color:'#1a2332',padding:'2px 8px',borderRadius:4,fontSize:10,flexShrink:0}}>{step.n}</span>
                  {step.title}

                <div className="flow-step-body">
                  <ul>{step.items.map((item,j)=><li key={j}>{item}</li>)}</ul>
                </div>
              </div>

          </div>
        )}

        {/* 基本情報 */}
        {sub==='basic' && (
          <div>
            <div className="k-sec">
              <div className="k-sec-hdr">👤 代表者・パートナー様</div>

                <div className="k-field"><span className="k-label">氏名②</span><div style={{padding:'4px 6px',fontSize:12,fontWeight:700,color:'#1a2332'}}>{activeCustomer?.name2||'—'}</div></div>
                {f('フリガナ①','furigana1','ヤマダ タロウ')}
                {f('フリガナ②','furigana2','ヤマダ ハナコ')}
                {f('年齢①','age1','35','number')}
                {f('年齢②','age2','33','number')}
                {f('年収①（万円）','income1','500')}
                {f('年収②（万円）','income2','300')}
                {f('勤続年数①','years1','10年')}

// Parse "YYYY-MM-DD" as LOCAL midnight (avoids UTC offset bug with new Date("YYYY-MM-DD"))
function parseLocalDate(str) {
  if (!str) return null;
  const p = str.split('-').map(Number);
  if (p.length < 3 || isNaN(p[0]) || isNaN(p[1]) || isNaN(p[2])) return null;
  return new Date(p[0], p[1]-1, p[2], 0, 0, 0, 0);
}

function ScheduleTab({activeCustomer}) {
  const custId = activeCustomer?.id || 'default';
  const custName = activeCustomer
    ? activeCustomer.name1 + (activeCustomer.name2 ? ` / ${activeCustomer.name2}` : '') : '';

  const [sched, setSched] = React.useState(() => loadScheduleData(custId));
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => { setSched(loadScheduleData(custId)); }, [custId]);

  const save = React.useCallback((updater) => {
    setSched(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveScheduleData(custId, next);
      return next;
    });
  }, [custId]);

  // Calculate 9 meeting dates from startDate (every 14 days)
  const meetingDates = React.useMemo(() => {
    if (!sched.startDate) return [];
    const base = parseLocalDate(sched.startDate);
    if (!base) return [];
    return Array.from({length:9}, (_, i) => {
      const d = new Date(base);
      d.setDate(d.getDate() + i * 14);
      return d;
    });
  }, [sched.startDate]);

  const fmtMD = (d) => `${d.getMonth()+1}月${d.getDate()}日`;
  const dayClass = (d) => d.getDay()===0?'sun':d.getDay()===6?'sat':'';

  // Calendar days: start of start month → end of month containing latest task/meeting date
  const calDays = React.useMemo(() => {
    if (!sched.startDate) return [];
    const base = parseLocalDate(sched.startDate);
    if (!base) return [];
    const from = new Date(base.getFullYear(), base.getMonth(), 1);
    // Default end: cover at least startDate month + 4
    let latestDate = new Date(base.getFullYear(), base.getMonth() + 4, 0);
    // Extend to cover 9th meeting date
    if (meetingDates.length > 0) {
      const last = meetingDates[meetingDates.length - 1];
      const endOfMeetingMonth = new Date(last.getFullYear(), last.getMonth() + 1, 0);
      if (endOfMeetingMonth > latestDate) latestDate = endOfMeetingMonth;
    }
    // Extend to cover task bar end dates
    Object.values(sched.tasks).forEach(t => {
      if (t.end) {
        const e = parseLocalDate(t.end);
        if (e) {
          const endOfMonth = new Date(e.getFullYear(), e.getMonth() + 1, 0);
          if (endOfMonth > latestDate) latestDate = endOfMonth;
        }
      }
    });
    const days = [];
    for (let d = new Date(from); d <= latestDate; d.setDate(d.getDate()+1)) days.push(new Date(d));
    return days;
  }, [sched.startDate, sched.tasks, meetingDates]);

  // Group days by month
  const calMonths = React.useMemo(() => {
    const months = [];
    calDays.forEach(d => {
      const lbl = `${d.getFullYear()}/${d.getMonth()}`;
      if (!months.length || months[months.length-1].key !== lbl) {
        months.push({key:lbl, label:`${d.getMonth()+1}月`, days:[]});
      }
      months[months.length-1].days.push(d);
    });
    return months;
  }, [calDays]);

  // Split into panels of 2 months
  const calPanels = React.useMemo(() => {
    const panels = [];
    for (let i = 0; i < calMonths.length; i += 2) panels.push(calMonths.slice(i, i+2));
    return panels;
  }, [calMonths]);

  const meetingDateSet = React.useMemo(() => new Set(meetingDates.map(d=>d.toDateString())), [meetingDates]);
  const meetingIndexOf = (d) => meetingDates.findIndex(md=>md.toDateString()===d.toDateString());

  const isInTask = (key, day) => {
    const t = sched.tasks[key];
    if (!t?.start || !t?.end) return false;
    const s = parseLocalDate(t.start);
    const e = parseLocalDate(t.end);
    if (!s || !e) return false;
    e.setHours(23, 59, 59, 999);
    return day >= s && day <= e;
  };

  if (!activeCustomer) {
    return (
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:400,color:'var(--muted)'}}>
        <div style={{fontSize:48,marginBottom:16}}>📅</div>
        <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>お客様が選択されていません</div>
        <div>「お客様リスト」タブでお客様を選択してください</div>
      </div>
    );
  }

  return (
    <div className="sched-wrap">
      {/* Toolbar */}
      <div className="sched-toolbar no-print" style={{width:'270mm',marginBottom:10,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <label style={{fontSize:13,fontWeight:600,color:'var(--navy)'}}>起算日：</label>
          <input type="date" value={sched.startDate}
            onChange={e=>save(p=>({...p,startDate:e.target.value}))}
            style={{padding:'5px 8px',border:'1px solid var(--border)',borderRadius:5,fontSize:13}}/>
        </div>
        {meetingDates.length > 0 && (
          <div style={{fontSize:11,color:'var(--muted)'}}>
            第1回：{fmtMD(meetingDates[0])}（{JP_DAYS_SHORT[meetingDates[0].getDay()]}）〜
            第9回：{fmtMD(meetingDates[8])}（{JP_DAYS_SHORT[meetingDates[8].getDay()]}）
          </div>
        )}
        <div style={{marginLeft:'auto',display:'flex',gap:6}}>
          {editMode
            ? <button className="print-btn" style={{background:'#27ae60',padding:'6px 14px',borderRadius:5,border:'none',color:'#fff',cursor:'pointer',fontSize:12}} onClick={()=>setEditMode(false)}>💾 編集完了</button>
            : <button className="print-btn" style={{background:'var(--navy)',padding:'6px 14px',borderRadius:5,border:'none',color:'#fff',cursor:'pointer',fontSize:12}} onClick={()=>setEditMode(true)}>✏️ 編集</button>
          }
          <button style={{padding:'6px 14px',borderRadius:5,border:'none',background:'#3498db',color:'#fff',cursor:'pointer',fontSize:12}} onClick={()=>window.print()}>🖨 印刷</button>
        </div>
      </div>

      {/* Task date inputs (edit mode) */}
      {editMode && (
        <div className="no-print" style={{width:'270mm',background:'#fff',border:'1px solid var(--border)',borderRadius:8,padding:12,marginBottom:10}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--navy)',marginBottom:8}}>📊 ガントバー 期間設定</div>
          <div className="sched-task-inputs">
            {SCHED_TASK_ROWS.map(row => (
              <div key={row.key} className="sched-task-inp-row">
                <label style={{display:'inline-block',width:14,height:10,background:row.color,borderRadius:2,marginRight:4,flexShrink:0}}></label>
                <label>{row.label}：</label>
                <input type="date" value={sched.tasks[row.key]?.start||''} placeholder="開始"
                  onChange={e=>save(p=>({...p,tasks:{...p.tasks,[row.key]:{...p.tasks[row.key],start:e.target.value}}}))}/>
                <span style={{fontSize:10,color:'#888'}}>〜</span>
                <input type="date" value={sched.tasks[row.key]?.end||''} placeholder="終了"
                  onChange={e=>save(p=>({...p,tasks:{...p.tasks,[row.key]:{...p.tasks[row.key],end:e.target.value}}}))}/>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Document */}
      <div className="sched-doc">
        {/* Header */}
        <div className="sched-hdr">
          <div>
            <div><span className="sched-title-main">schedule</span><span className="sched-title-sub">－ スケジュール －</span></div>
            <div className="sched-subtitle-txt">今後のお打ち合わせのスケジュールの目安としてご利用ください。打ち合わせ完了時に本用紙に押印を行います。必ずご持参ください。</div>
          </div>
          <div className="sched-cust-info">
            <div className="sched-cust-row"><span className="sched-cust-lbl">お客様</span><span className="sched-cust-val">{custName || '—'} 様</span></div>
            <div className="sched-cust-row"><span className="sched-cust-lbl">物件名</span><span className="sched-cust-val">{activeCustomer.property || '—'}</span></div>
            <div className="sched-cust-row"><span className="sched-cust-lbl">建築地</span><span className="sched-cust-val">{activeCustomer.address || '—'}</span></div>
          </div>
        </div>

        {/* Meeting schedule table */}
        <table className="sched-tbl">
          <thead>
            <tr>
              <th className="sched-row-lbl">予定</th>
              {MEETING_LABELS.map((m,i) => (
                <th key={i} className="sched-meet-th">
                  {m.label}
                  {m.sub && <div style={{fontSize:'5.5pt',fontWeight:400,color:'#e8e0d0'}}>{m.sub}</div>}
                  {m.star && <div className="sched-meet-star">{m.star}</div>}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {/* 時点予定日 */}
            <tr>
              <td className="sched-row-lbl" style={{background:'#d4c8b8'}}>時点予定日</td>
              {MEETING_LABELS.map((_,i) => (
                <td key={i} style={{background:'#faf8f4',padding:'3px 2px'}}>
                  {meetingDates[i] ? (
                    <div className="sched-calc-date-wrap">
                      {fmtMD(meetingDates[i])}
                      <span className={`sched-day-bdg ${dayClass(meetingDates[i])}`}>
                        {JP_DAYS_SHORT[meetingDates[i].getDay()]}
                      </span>
                    </div>
                  ) : <span style={{color:'#ccc',fontSize:'7pt'}}>—</span>}
                </td>
              ))}
            </tr>
            {/* 実施日 */}
            <tr>
              <td className="sched-row-lbl" style={{background:'#d4c8b8'}}>実施日</td>
              {MEETING_LABELS.map((_,i) => (
                <td key={i} className="sched-act-cell">
                  {editMode ? (
                    <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:1,padding:'1px'}}>
                      <input type="number" min="1" max="12"
                        value={sched.actualDates[i]?.m||''}
                        onChange={e=>save(p=>{const a=[...p.actualDates];a[i]={...a[i],m:e.target.value};return{...p,actualDates:a};})}
                        style={{width:22,padding:'0 1px',fontSize:8,textAlign:'center',border:'0.5px solid #bbb',borderRadius:2}}/>
                      <span style={{fontSize:7}}>月</span>
                      <input type="number" min="1" max="31"
                        value={sched.actualDates[i]?.d||''}
                        onChange={e=>save(p=>{const a=[...p.actualDates];a[i]={...a[i],d:e.target.value};return{...p,actualDates:a};})}
                        style={{width:22,padding:'0 1px',fontSize:8,textAlign:'center',border:'0.5px solid #bbb',borderRadius:2}}/>
                      <span style={{fontSize:7}}>日</span>
                      <input type="checkbox" title="押印済"
                        checked={sched.actualDates[i]?.stamp||false}
                        onChange={e=>save(p=>{const a=[...p.actualDates];a[i]={...a[i],stamp:e.target.checked};return{...p,actualDates:a};})}
                        style={{marginLeft:2,width:10,height:10}}/>
                    </div>
                  ) : (
                    <div className="sched-act-txt" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:1}}>
                      {(sched.actualDates[i]?.m||sched.actualDates[i]?.d) ? (
                        <>
                          <span>{sched.actualDates[i]?.m}月</span>
                          <span>{sched.actualDates[i]?.d}日</span>
                          <span className={`sched-stamp${sched.actualDates[i]?.stamp?' done':''}`}>
                            {sched.actualDates[i]?.stamp?'印':'印'}
                          </span>
                        </>
                      ) : <span style={{color:'#ddd',fontSize:'7pt'}}>—</span>}
                    </div>
                  )}
                </td>
              ))}
            </tr>
          </tbody>
        </table>

        {/* CHECK section */}
        <div className="sched-check-sec">
          <div className="sched-check-ttl">CHECK <span>ご確認ください</span></div>
          <div className="sched-check-grid">
            {[
              {key:'chosei', label:'打ち合わせ可能日調整をお願いいたします。', type:'check'},
              {key:'sotoko', label:'外構業者様のご紹介は必要でしょうか？その場合お打ち合わせ日程の調整をお願いいたします。', type:'ari-nashi'},
              {key:'curtain', label:'カーテン業者様のご紹介は必要でしょうか？その場合お打ち合わせ日程の調整をお願いいたします。', type:'ari-nashi'},
              {key:'kaitai', label:'解体工事はございますか？またいつ頃の予定でしょうか？', type:'ari-nashi'},
              {key:'jiban', label:'地盤調査可能日程の調整をお願いいたします。', type:'check'},
              {key:'kagu', label:'家具・家電のご紹介は必要でしょうか？', type:'ari-nashi'},
            ].map(item => (
              <div key={item.key} className="sched-chk-item">
                {item.type === 'check' ? (
                  <input type="checkbox" checked={sched.checks[item.key]||false} disabled={!editMode}
                    onChange={e=>save(p=>({...p,checks:{...p.checks,[item.key]:e.target.checked}}))}/>
                ) : (
                  <input type="checkbox" checked={!!sched.checks[item.key]} disabled={!editMode}
                    onChange={e=>save(p=>({...p,checks:{...p.checks,[item.key]:e.target.checked?'ari':''}}))}/>
                )}
                <div>
                  {item.label}
                  {item.type === 'ari-nashi' && (
                    <span className="sched-ari-nashi">
                      <label>
                        <input type="radio" name={`check-${item.key}`} value="ari"
                          checked={sched.checks[item.key]==='ari'} disabled={!editMode}
                          onChange={()=>save(p=>({...p,checks:{...p.checks,[item.key]:'ari'}}))}/>
                        有
                      </label>
                      ・
                      <label>
                        <input type="radio" name={`check-${item.key}`} value="nashi"
                          checked={sched.checks[item.key]==='nashi'} disabled={!editMode}
                          onChange={()=>save(p=>({...p,checks:{...p.checks,[item.key]:'nashi'}}))}/>
                        無
                      </label>
                    </span>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Calendar grid */}
        {calPanels.length > 0 && (
          <div className="sched-cal-sec">
            {calPanels.map((panelMonths, pi) => {
              const panelDays = panelMonths.flatMap(m => m.days);
              return (
                <div key={pi} className="sched-cal-panel">
                  <table className="sched-cal-tbl">
                    <tbody>
                      {/* Month header row */}
                      <tr>
                        <td className="sched-cal-row-lbl-cell sched-cal-month-span" style={{background:'transparent',color:'transparent',border:'none'}}></td>
                        {panelMonths.map(m => (
                          <td key={m.key} colSpan={m.days.length} className="sched-cal-month-span">{m.label}</td>
                        ))}
                      </tr>
                      {/* Date numbers row */}
                      <tr>
                        <td className="sched-cal-row-lbl-cell sched-cal-datenum" style={{textAlign:'left',paddingLeft:3}}>日</td>
                        {panelDays.map((d,i) => (
                          <td key={i} className="sched-cal-datenum">{d.getDate()}</td>
                        ))}
                      </tr>
                      {/* Day of week row */}
                      <tr>
                        <td className="sched-cal-row-lbl-cell sched-cal-day-cell">曜日</td>
                        {panelDays.map((d,i) => (
                          <td key={i} className={`sched-cal-day-cell${d.getDay()===0?' sun':d.getDay()===6?' sat':''}`}>
                            {JP_DAYS_SHORT[d.getDay()]}
                          </td>
                        ))}
                      </tr>
                      {/* Meeting row */}
                      <tr>
                        <td className="sched-cal-row-lbl-cell">お打ち合わせ</td>
                        {panelDays.map((d,i) => {
                          const idx = meetingIndexOf(d);
                          return (
                            <td key={i} className="sched-meet-dot" style={{background: idx>=0 ? '#fde8e8' : ''}}>
                              {idx >= 0 ? `${'①②③④⑤⑥⑦⑧⑨'[idx]}` : ''}
                            </td>
                          );
                        })}
                      </tr>
                      {/* Task rows */}
                      {SCHED_TASK_ROWS.map(row => (
                        <tr key={row.key}>
                          <td className="sched-cal-row-lbl-cell">{row.label}</td>
                          {panelDays.map((d,i) => {
                            const active = isInTask(row.key, d);
                            return (
                              <td key={i} className={active?'sched-task-cell':''}
                                style={{background: active ? row.color : ''}}></td>
                            );
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              );
            })}
          </div>
        )}

        {/* Empty state when no start date */}
        {!sched.startDate && (
          <div style={{textAlign:'center',padding:'20mm',color:'#aaa',fontSize:'10pt'}}>
            ← 上部の「起算日」を入力するとスケジュールが自動生成されます
          </div>
        )}
      </div>
    </div>
  );
}

// ===== SPEC SHEET =====
function SpecSheet({cart, activeCustomer, customerDate}) {
  const custName = activeCustomer
    ? activeCustomer.name1 + (activeCustomer.name2 ? ` / ${activeCustomer.name2}` : '')
    : '';

  const tabRef = React.useRef(null);
  const a3Ref  = React.useRef(null);

  React.useEffect(() => {
    const applyScale = () => {
      if (!tabRef.current || !a3Ref.current) return;
      const tabW = tabRef.current.clientWidth;
      const a3W  = a3Ref.current.scrollWidth;
      if (!a3W) return;
      const s   = Math.min(1, (tabW - 24) / a3W);
      const a3H = a3Ref.current.scrollHeight;
      a3Ref.current.style.transform       = `scale(${s})`;
      a3Ref.current.style.transformOrigin = 'top center';
      a3Ref.current.style.marginBottom    = `${Math.round((s - 1) * a3H)}px`;
    };
    const tid = setTimeout(applyScale, 80);
    window.addEventListener('resize', applyScale);
    return () => { clearTimeout(tid); window.removeEventListener('resize', applyScale); };
  }, [cart, activeCustomer, customerDate]);

  const specKey = activeCustomer?.id || 'default';
  const [specEdits, setSpecEdits] = React.useState(() => loadSpecEdits(specKey));
  const [undoStack, setUndoStack] = React.useState([]);
  const [redoStack, setRedoStack] = React.useState([]);
  const [specEditMode, setSpecEditMode] = React.useState(false);
  const specEditsRef = React.useRef(specEdits);
  React.useEffect(() => { specEditsRef.current = specEdits; }, [specEdits]);

  const onEdit = React.useCallback((k, v) => {
    const current = specEditsRef.current;
    setUndoStack(prev => [...prev.slice(-49), current]);
    setRedoStack([]);
    const next = {...current, [k]: v};
    setSpecEdits(next);
    saveSpecEdits(specKey, next);
  }, [specKey]);

  const handleUndo = React.useCallback(() => {
    setUndoStack(prev => {
      if (prev.length === 0) return prev;
      const prevState = prev[prev.length - 1];
      setRedoStack(r => [...r.slice(-49), specEditsRef.current]);
      setSpecEdits(prevState);
      saveSpecEdits(specKey, prevState);
      return prev.slice(0, -1);
    });
  }, [specKey]);

  const handleRedo = React.useCallback(() => {
    setRedoStack(prev => {
      if (prev.length === 0) return prev;
      const nextState = prev[prev.length - 1];
      setUndoStack(u => [...u.slice(-49), specEditsRef.current]);
      setSpecEdits(nextState);
      saveSpecEdits(specKey, nextState);
      return prev.slice(0, -1);
    });
  }, [specKey]);

  const [saveMsg, setSaveMsg] = React.useState('');
  const handleSave = React.useCallback(() => {
    if (!a3Ref.current) return;
    const cells = a3Ref.current.querySelectorAll('[data-spec-id]');
    const updates = {};
    cells.forEach(el => {
      const sel = el.querySelector('select');
      updates[el.dataset.specId] = sel ? sel.value : el.innerText.trim();
    });
    setUndoStack(prev => [...prev.slice(-49), specEditsRef.current]);
    setRedoStack([]);
    setSpecEdits(p => {
      const next = {...p, ...updates};
      saveSpecEdits(specKey, next);
      return next;
    });
    setSaveMsg('保存しました ✓');
    setTimeout(() => setSaveMsg(''), 2500);
  }, [specKey]);

  // Organize cart by category
  const bycat = React.useMemo(() => {
    const m = {};
    cart.forEach(sel => {
      if(!m[sel.product.cat]) m[sel.product.cat] = [];
      m[sel.product.cat].push(sel);
    });
    return m;
  }, [cart]);

  const g = (...cats) => cats.flatMap(c => bycat[c] || []);

  // Extract display info from a cart item
  const si = (sel) => {
    const p = sel.product;
    const colors = (sel.selectedColors || []).join('・');
    const models = (sel.selectedModels || []).join('・');
    return { name: p.name, maker: p.maker, colors, models, note: sel.note };
  };

  // Renders one or more rows for a labeled group of cart items
  const GRows = ({label, items, def='-'}) => {
    if (!items || items.length === 0) {
      return (
        <tr>
          <th className="spec-row-label">{label}</th>
          <td colSpan={2}><span className="spec-empty">{def}</span></td>
          <SpecBiko id={`bk-${label}`} onEdit={onEdit}/>
        </tr>
      );
    }
    return items.map((sel, i) => {
      const {name, maker, colors, models, note} = si(sel);
      return (
        <tr key={sel.id}>
          {i === 0 && <th className="spec-row-label" rowSpan={items.length}>{label}</th>}
          <td className="filled">{name}</td>
          <td>{colors || models || note || maker}</td>
          {i === 0 && <SpecBiko id={`bk-${label}`} rowSpan={items.length} onEdit={onEdit}/>}
        </tr>
      );
    });
  };

  // 標準数量 + カートからの追加数 + 合計 を1行で表示
  const DenkiStdRow = ({label, stdText, stdNum, addItems, unit='カ所', bikoId}) => {
    const addQty = sumQty(addItems);
    const total  = (stdNum||0) + addQty;
    return (
      <tr>
        <th className="spec-row-label">{label}</th>
        <SpecCell id={`sc-std-${bikoId}`} def={stdText} onEdit={onEdit}/>
        <td className="denki-add">{addQty > 0 ? `+${addQty}${unit}` : '-'}</td>
        <td className="denki-total">{total > 0 ? `計 ${total}${unit}` : '-'}</td>
        <SpecBiko id={bikoId} onEdit={onEdit}/>
      </tr>
    );
  };

  // 追加のみ（標準なし）の行 — カートに選択があれば品名+数量を表示
  const DenkiAddRow = ({label, items, unit='カ所', bikoId}) => {
    if (!items || items.length === 0) return (
      <tr>
        <th className="spec-row-label">{label}</th>
        <td colSpan={3}><span className="spec-empty">-</span></td>
        <SpecBiko id={bikoId} onEdit={onEdit}/>
      </tr>
    );
    return items.map((sel, i) => {
      const {name, colors, models, note} = si(sel);
      const qty = parseFloat(sel.qty) || 0;
      const unt = sel.unit || sel.product.unit || unit;
      return (
        <tr key={sel.id}>
          {i===0 && <th className="spec-row-label" rowSpan={items.length}>{label}</th>}
          <td className="filled">{name}</td>
          <td className="denki-add">{qty > 0 ? `+${qty}${unt}` : (colors||models||note||'-')}</td>
          <td className="denki-total">{qty > 0 ? `計 ${qty}${unt}` : ''}</td>
          {i===0 && <SpecBiko id={bikoId} rowSpan={items.length} onEdit={onEdit}/>}
        </tr>
      );
    });
  };

  const gaihekiItems  = g('gaiheki','gaiheki-kinzoku','gaiheki-nuri','gaiheki-solido');
  const madoItems     = g('mado330','mado430');
  const genkanItems   = g('genkan-door');
  const garageItems   = g('garage');
  const yaneItems     = g('yane');
  const hisashiItems  = g('hisashi');
  const porchItems    = g('porch');
  const ecocuteItems  = g('ecocute');
  const gaibusetsubi  = g('gaibu-setsubi');
  const slop          = g('slop');
  const switchItems   = g('switch');
  const airconItems   = g('aircon');

  const yaneRoof = yaneItems.filter(s => s.product.name.includes('屋根'));
  const yaneFu   = yaneItems.filter(s => s.product.name.includes('破風'));
  const yaneNoki = yaneItems.filter(s => s.product.name.includes('軒天'));
  const yaneYoki = yaneItems.filter(s => s.product.name.includes('横樋') || s.product.name.includes('ファインスケア'));
  const yaneTate = yaneItems.filter(s => s.product.name.includes('縦樋') || s.product.name.includes('S30'));

  const ecoKyu   = ecocuteItems.filter(s => s.product.name.includes('エコキュート') || s.product.name.includes('ナイアガラ') || s.product.name.includes('おひさま'));
  const ecoKan   = ecocuteItems.filter(s => s.product.name.includes('換気'));
  const ecoSolar = ecocuteItems.filter(s => s.product.name.includes('太陽光') || s.product.name.includes('蓄電'));

  const gaibWater  = gaibusetsubi.filter(s => s.product.name.includes('水栓'));
  const gaibCons   = gaibusetsubi.filter(s => s.product.name.includes('コンセント'));
  const gaibAnt    = gaibusetsubi.filter(s => s.product.name.includes('アンテナ'));
  const gaibCamera = gaibusetsubi.filter(s => s.product.name.includes('カメラ') || s.product.name.includes('センサー'));

                  <tr><th className="spec-row-label">TVコンセント</th><SpecCell id="sc-tv" def="標準 2カ所" colSpan={3} onEdit={onEdit}/><SpecBiko id="bk-tv" onEdit={onEdit}/></tr>
                </tbody>
              </table>
            </div>

          </div>
        </div>

        {/* ── 注意事項 ── */}
        <div className="spec-note-box">
          <div className="spec-note-title">【注意事項】</div>

        </div>

        {/* ── 署名欄 ── */}

}
