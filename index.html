<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2332;--navy2:#243447;--gold:#c8a45c;--gold2:#e6c97a;
  --bg:#f0f2f5;--white:#fff;--text:#2c3e50;--muted:#6c7a89;
  --border:#dde1e7;--green:#27ae60;--orange:#e67e22;--red:#e74c3c;--blue:#3498db;
  --sidebar:260px;--header:60px;--cart:320px;
}
html,body{height:100%;font-family:'Segoe UI','Hiragino Sans','Meiryo',sans-serif;font-size:13px;background:var(--bg);color:var(--text)}
#root{height:100%}

/* LAYOUT */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{height:var(--header);background:var(--navy);color:#fff;display:flex;align-items:center;gap:16px;padding:0 20px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header-logo{font-size:18px;font-weight:700;letter-spacing:2px;white-space:nowrap;display:flex;align-items:center;gap:0}
.header-logo .logo-n{color:var(--gold);letter-spacing:3px;font-weight:800}
.header-logo .logo-sep{color:var(--gold);margin:0 4px;font-weight:400;font-size:20px;line-height:1}
.header-logo .logo-c{color:#fff;letter-spacing:3px;font-weight:500}
.header-tabs{display:flex;gap:4px;margin-left:16px}
.tab-btn{padding:6px 18px;border-radius:20px;border:1px solid #3a4d63;background:transparent;color:#8899aa;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.tab-btn:hover{border-color:var(--gold);color:var(--gold)}
.tab-btn.active{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.header-customer{display:flex;gap:10px;align-items:center;margin-left:auto}
.header-input{padding:5px 10px;border-radius:6px;border:1px solid #3a4d63;background:#243447;color:#fff;font-size:12px;width:160px}
.header-input::placeholder{color:#556677}
.header-select{padding:5px 8px;border-radius:6px;border:1px solid #3a4d63;background:#243447;color:#fff;font-size:12px;cursor:pointer}
.header-line-filter{display:flex;gap:4px}
.lf-btn{padding:4px 10px;border-radius:12px;border:1px solid #3a4d63;background:transparent;color:#8899aa;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.lf-btn.active{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.lf-btn:hover:not(.active){border-color:var(--gold);color:var(--gold)}

.body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--white);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.sidebar-group{padding:8px 0}
.sidebar-grouplabel{padding:6px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:flex;align-items:center;gap:6px}
.sidebar-grouplabel::before{content:'';display:block;width:3px;height:12px;border-radius:2px;background:var(--blue)}
.sidebar-grouplabel.detail::before{background:var(--gold)}
.sidebar-item{display:flex;align-items:center;justify-content:space-between;padding:6px 14px 6px 20px;font-size:12px;color:var(--text);cursor:pointer;transition:all .12s;border-left:3px solid transparent}
.sidebar-item:hover{background:#f5f7fa}
.sidebar-item.active{background:#eef3ff;color:var(--blue);border-left-color:var(--blue);font-weight:600}
.sidebar-item .ct{font-size:10px;background:#f0f2f5;color:var(--muted);padding:1px 6px;border-radius:8px}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.search-bar{padding:10px 16px;background:var(--white);border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;flex-shrink:0}
.search-input{flex:1;padding:7px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;transition:border .2s}
.search-input:focus{border-color:var(--blue)}
.filter-tags{display:flex;gap:6px}
.ftag{padding:4px 10px;border-radius:12px;border:1px solid var(--border);background:transparent;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.ftag.active{background:var(--text);color:#fff;border-color:var(--text)}
.ftag.std.active{background:var(--green);border-color:var(--green)}
.ftag.op.active{background:var(--orange);border-color:var(--orange)}
.ftag.hit.active{background:var(--red);border-color:var(--red)}

.products{flex:1;overflow-y:auto;padding:12px}
.cat-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:10px;padding:8px 12px;background:linear-gradient(to right,var(--navy),var(--navy2));color:#fff;border-radius:8px;display:flex;align-items:center;gap:8px}
.cat-title .group-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700}
.cat-title .group-badge.facade{background:#e8f0fe;color:#1a73e8}
.cat-title .group-badge.detail{background:rgba(200,164,92,.2);color:var(--gold2)}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;margin-bottom:20px}
.product-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all .2s;position:relative}
.product-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08);border-color:#bbc3cf;transform:translateY(-1px)}
.product-card.selected{border-color:var(--blue);background:#f0f5ff}
.pc-name{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px}
.pc-maker{font-size:11px;color:var(--muted)}
.pc-tags{display:flex;gap:4px;flex-wrap:wrap;margin:6px 0}
.tag{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700}
.tag.std{background:#e6f7ee;color:#1a8a4a}
.tag.op{background:#fff3e0;color:#c77600}
.tag.hit{background:#fde8e8;color:#c0392b}
.pc-price{font-size:13px;font-weight:700;color:var(--navy);margin:6px 0}
.pc-price .unit{font-size:11px;font-weight:400;color:var(--muted)}
.pc-note{font-size:11px;color:var(--muted);border-left:2px solid var(--gold);padding-left:6px;margin-top:4px}
.pl{font-size:10px;padding:1px 6px;border-radius:6px;font-weight:600}




.add-btn{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-weight:700;line-height:1}
.add-btn:hover{background:#2980b9;transform:scale(1.1)}
.add-btn.in-cart{background:var(--green)}

/* CART PANEL */
.cart{width:var(--cart);background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.cart-header{padding:12px 14px;background:var(--navy);color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:space-between}
.cart-header .cnt{background:var(--gold);color:var(--navy);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.cart-items{flex:1;overflow-y:auto;padding:8px}
.cart-item{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:6px;position:relative}
.ci-name{font-size:12px;font-weight:700;color:var(--navy);padding-right:20px}
.ci-maker{font-size:10px;color:var(--muted)}
.ci-controls{display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap}
.ci-qty{display:flex;align-items:center;gap:4px}
.qty-btn{width:22px;height:22px;border-radius:4px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.qty-btn:hover{background:#f0f2f5}
.qty-input{width:50px;text-align:center;padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:12px}
.unit-select{padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:11px;background:#fff;cursor:pointer}
.ci-price-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.ci-price-label{font-size:11px;color:var(--muted)}
.ci-price-val{font-size:13px;font-weight:700;color:var(--navy)}
.ci-note-input{width:100%;margin-top:4px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:11px;color:var(--text)}
.ci-custom-price{width:90px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;text-align:right}
.ci-remove{position:absolute;top:6px;right:6px;background:none;border:none;color:#bbc3cf;font-size:16px;cursor:pointer;line-height:1;padding:0}
.ci-remove:hover{color:var(--red)}
.cart-footer{padding:12px 14px;border-top:2px solid var(--border);background:var(--bg)}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.total-label{font-size:12px;color:var(--muted)}
.total-val{font-size:12px;font-weight:600;color:var(--text)}
.grand-total{font-size:16px;font-weight:700;color:var(--navy);border-top:1px solid var(--border);margin-top:6px;padding-top:6px}
.grand-val{font-size:18px;color:var(--blue)}
.proposal-btn{width:100%;margin-top:10px;padding:10px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s}
.proposal-btn:hover{background:#243447}
.clear-btn{width:100%;margin-top:6px;padding:7px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;transition:all .2s}
.clear-btn:hover{background:#fde8e8;color:var(--red);border-color:var(--red)}
.empty-cart{text-align:center;padding:40px 14px;color:var(--muted)}
.empty-cart .icon{font-size:40px;margin-bottom:10px;opacity:.4}

/* COLOR SELECT */
.ci-color{padding:2px 4px;border:1px solid var(--border);border-radius:4px;font-size:11px;background:#fff;cursor:pointer;max-width:120px}

/* AREA CALC */
.ci-area-block{background:#eef3ff;border:1px solid #c5d5f5;border-radius:6px;padding:8px 10px;margin-top:6px}
.ci-area-label{font-size:10px;font-weight:700;color:#3a5ba0;margin-bottom:5px;letter-spacing:.5px}
.ci-area-formula{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ci-unit-price{display:flex;align-items:center;gap:3px;font-size:12px;color:var(--muted)}
.ci-unit-price input{width:82px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;font-size:12px;text-align:right;background:#fff}
.ci-op{font-size:14px;font-weight:700;color:var(--muted)}
.ci-area-input-wrap{display:flex;align-items:center;gap:3px}
.ci-area-input{width:70px;padding:4px 6px;border:2px solid var(--blue);border-radius:6px;font-size:14px;font-weight:700;text-align:center;color:var(--navy);outline:none}
.ci-area-input:focus{border-color:#2471d4;box-shadow:0 0 0 2px rgba(52,152,219,.2)}
.ci-area-unit{font-size:12px;font-weight:700;color:var(--navy)}
.ci-area-total{margin-left:auto;font-size:15px;font-weight:700;color:var(--blue);white-space:nowrap}
.ci-area-total.empty{color:var(--muted);font-size:12px;font-weight:400}

/* COUNT CALC */
.ci-count-block{margin-top:6px}
.ci-count-row{display:flex;align-items:center;gap:6px}
.qty-btn{width:24px;height:24px;border-radius:4px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background .15s;line-height:1}
.qty-btn:hover{background:#f0f2f5}
.qty-input{width:52px;text-align:center;padding:3px 4px;border:1px solid var(--border);border-radius:4px;font-size:13px;font-weight:700}
.ci-count-price-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.ci-count-unit-price{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--muted)}
.ci-count-unit-price input{width:82px;padding:2px 6px;border:1px solid var(--border);border-radius:4px;font-size:11px;text-align:right;background:#fff}
.ci-count-total{font-size:13px;font-weight:700;color:var(--navy)}

/* PROPOSAL TAB */
.proposal{flex:1;overflow-y:auto;padding:20px;background:#f5f5f5;display:none}
.proposal.active{display:block}
.proposal-inner{max-width:800px;margin:0 auto;background:#fff;padding:40px;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.prop-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:30px;padding-bottom:20px;border-bottom:3px solid var(--navy)}
.prop-logo{font-size:24px;font-weight:700;letter-spacing:2px;color:var(--navy)}
.prop-logo span{color:var(--gold)}
.prop-meta{text-align:right;font-size:12px;color:var(--muted)}
.prop-meta .doc-no{font-size:14px;font-weight:700;color:var(--navy)}
.prop-customer{margin-bottom:24px;padding:16px;background:#f8f9fb;border-radius:8px;border-left:4px solid var(--gold)}
.prop-customer h3{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px}
.prop-customer .name{font-size:18px;font-weight:700;color:var(--navy)}
.prop-customer .sub{font-size:12px;color:var(--muted);margin-top:2px}
.prop-section{margin-bottom:24px}
.prop-section-title{font-size:13px;font-weight:700;color:#fff;background:var(--navy);padding:8px 14px;border-radius:6px;margin-bottom:0;display:flex;align-items:center;gap:8px}
.prop-section-title .badge{font-size:10px;padding:1px 8px;border-radius:8px}
.prop-section-title .badge.facade{background:#3498db;color:#fff}
.prop-section-title .badge.detail{background:var(--gold);color:var(--navy)}
.prop-table{width:100%;border-collapse:collapse;font-size:12px}
.prop-table th{background:#f4f5f7;padding:8px 10px;text-align:left;border:1px solid #e0e3e8;font-weight:700;color:var(--muted);font-size:11px}
.prop-table td{padding:8px 10px;border:1px solid #e0e3e8;vertical-align:top}
.prop-table tr:nth-child(even) td{background:#fafbfc}
.prop-table .td-name{font-weight:600;color:var(--navy)}
.prop-table .td-price{text-align:right;font-weight:700;color:var(--navy);white-space:nowrap}
.prop-table .td-sub{font-size:11px;color:var(--muted)}
.prop-total{margin-top:20px;padding:16px;background:#f8f9fb;border-radius:8px;border:2px solid var(--navy)}
.prop-total-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px}
.prop-total-row.grand{font-size:16px;font-weight:700;color:var(--navy);border-top:2px solid var(--navy);margin-top:8px;padding-top:8px}
.prop-footer{margin-top:30px;padding-top:16px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);text-align:center}
.prop-sign{margin-top:40px;display:flex;justify-content:space-between}
.prop-sign-box{border-top:1px solid #999;width:180px;text-align:center;padding-top:4px;font-size:11px;color:var(--muted)}
.print-btn{padding:8px 18px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:16px}
.print-btn:hover{background:#243447}
.no-items-msg{text-align:center;padding:60px;color:var(--muted)}
/* CUSTOMER LIST TAB */
.cust-tab{flex:1;overflow-y:auto;padding:20px;background:var(--bg)}
.cust-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.cust-search{flex:1;min-width:180px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:#fff}
.cust-search:focus{border-color:var(--blue)}
.cust-new-btn{padding:8px 18px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .2s}
.cust-new-btn:hover{background:#243447}
.cust-count{font-size:12px;color:var(--muted);white-space:nowrap}
.cust-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.cust-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;transition:box-shadow .2s}
.cust-card:hover{box-shadow:0 3px 14px rgba(0,0,0,.09)}
.cust-card.active-cust{border-color:var(--blue);background:#f0f5ff}
.cust-card-names{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:4px;padding-right:30px}
.cust-card-names .name2{font-size:13px;color:var(--muted);font-weight:400;margin-left:6px}
.cust-card-prop{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:4px}
.cust-card-prop .prop-icon{opacity:.6}
.cust-card-meta{display:flex;gap:10px;font-size:11px;color:var(--muted);flex-wrap:wrap}
.cust-card-actions{display:flex;gap:6px;margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.ca-btn{flex:1;padding:6px 8px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.ca-btn.select{background:var(--navy);color:#fff;border-color:var(--navy)}
.ca-btn.select:hover{background:#243447}
.ca-btn.edit:hover{background:#f0f2f5}
.ca-btn.delete{color:var(--red)}
.ca-btn.delete:hover{background:#fde8e8;border-color:var(--red)}
.cust-active-badge{position:absolute;top:10px;right:10px;background:var(--blue);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px}
.cust-empty{text-align:center;padding:80px 20px;color:var(--muted)}
.cust-empty .icon{font-size:52px;margin-bottom:14px;opacity:.35}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:12px;padding:28px;width:100%;max-width:480px;box-shadow:0 8px 32px rgba(0,0,0,.18);animation:fadeUp .15s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.modal-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;display:block;letter-spacing:.4px}
.form-input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;outline:none;transition:border .2s}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(52,152,219,.12)}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.btn-primary{padding:9px 22px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s}
.btn-primary:hover{background:#243447}
.btn-secondary{padding:9px 18px;background:#fff;color:var(--text);border:1px solid var(--border);border-radius:7px;font-size:13px;cursor:pointer;transition:all .15s}
.btn-secondary:hover{background:#f0f2f5}
.btn-danger{padding:9px 18px;background:var(--red);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer}
.btn-danger:hover{background:#c0392b}

/* DELETE CONFIRM */
.del-confirm{background:#fff8f8;border:2px solid var(--red);border-radius:10px;padding:20px 24px;max-width:360px;width:100%}
.del-confirm-name{font-size:15px;font-weight:700;color:var(--navy);margin:8px 0 16px}
.del-confirm-msg{font-size:12px;color:var(--muted);margin-bottom:16px}

/* EDIT INLINE on card */
.cust-edit-form{background:#fff;border:2px solid var(--blue);border-radius:10px;padding:16px;margin-bottom:2px}

/* CHECKBOX SELECTION IN CART */
.ci-select-group{margin-top:7px}
.ci-select-label{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;letter-spacing:.3px}
.ci-checkbox-list{display:flex;flex-wrap:wrap;gap:4px;max-height:130px;overflow-y:auto;padding:2px 0}
.ci-chk-item{display:inline-flex;align-items:center;gap:4px;font-size:11px;background:#f8f9fb;border:1px solid var(--border);border-radius:5px;padding:3px 8px;cursor:pointer;transition:all .12s;user-select:none}
.ci-chk-item:hover{background:#eef3ff;border-color:var(--blue)}
.ci-chk-item.checked{background:#eef3ff;border-color:var(--blue);font-weight:600}
.ci-chk-item input[type=checkbox]{accent-color:var(--blue);cursor:pointer}
.model-no{font-size:10px;font-weight:700;color:var(--blue);background:#e8f0fe;padding:1px 5px;border-radius:4px}

/* ADMIN BUTTON */
.admin-btn{padding:5px 12px;border-radius:12px;border:1px solid #3a4d63;background:transparent;color:#8899aa;font-size:11px;font-weight:600;cursor:pointer;transition:all .2s;margin-left:8px}
.admin-btn:hover{border-color:var(--gold);color:var(--gold)}
.admin-btn.on{background:var(--gold);color:var(--navy);border-color:var(--gold)}

/* ADMIN TAB */
.admin-tab{flex:1;overflow-y:auto;padding:20px;background:var(--bg)}
.admin-toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.admin-search{flex:1;min-width:180px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:#fff}
.admin-search:focus{border-color:var(--blue)}
.admin-add-btn{padding:8px 16px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.admin-cat-block{background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:12px;overflow:hidden}
.admin-cat-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#f8f9fb;border-bottom:1px solid var(--border)}
.admin-cat-title{font-size:13px;font-weight:700;color:var(--navy)}
.admin-prod-row{display:flex;align-items:center;padding:7px 14px;border-bottom:1px solid #f5f6f8;gap:8px}
.admin-prod-row:last-child{border-bottom:none}
.admin-prod-name{flex:1;font-size:12px;color:var(--text)}
.admin-prod-price{font-size:11px;color:var(--muted);min-width:110px}
.admin-prod-custom{font-size:10px;background:#e6f7ee;color:#1a8a4a;padding:1px 6px;border-radius:6px;font-weight:700}
.ap-edit{padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:#fff;font-size:11px;cursor:pointer}
.ap-edit:hover{background:#eef3ff;border-color:var(--blue)}
.ap-del{padding:3px 10px;border-radius:5px;border:1px solid var(--border);background:#fff;font-size:11px;color:var(--red);cursor:pointer}
.ap-del:hover{background:#fde8e8;border-color:var(--red)}

/* PRODUCT EDIT MODAL */
.modal.wide{max-width:580px}
.list-editor{border:1px solid var(--border);border-radius:7px;overflow:hidden;margin-top:4px;background:#fff}
.le-item{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid #f0f2f5}
.le-item:last-child{border-bottom:none}
.le-item input{flex:1;padding:4px 7px;border:1px solid var(--border);border-radius:5px;font-size:12px}
.le-item .no-input{width:90px;flex:none}
.le-add-row{padding:6px 10px;background:#f8f9fb;display:flex;gap:6px}
.le-add-row input{flex:1;padding:5px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px}
.le-add-btn{padding:5px 12px;background:var(--blue);color:#fff;border:none;border-radius:5px;font-size:12px;cursor:pointer;white-space:nowrap}
.icon-del{background:none;border:none;color:#ccc;font-size:17px;cursor:pointer;line-height:1;padding:0 2px;flex-shrink:0}
.icon-del:hover{color:var(--red)}
.pw-change{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}

/* SPEC SHEET TAB */
.spec-tab{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;background:#f0f2f5;display:flex;flex-direction:column;align-items:center}
.spec-a3{width:400mm;background:#fff;padding:6mm 8mm;box-shadow:0 2px 16px rgba(0,0,0,.12);font-size:6pt;line-height:1.3;color:#000;margin-bottom:20px}
.spec-hd{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #1a2332;margin-bottom:5px;padding-bottom:5px}
.spec-hd-title{font-size:14pt;font-weight:700;color:#1a2332;letter-spacing:2px}
.spec-hd-sub{font-size:6.5pt;color:#555;margin-top:1px}
.spec-cols{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:4px}
.spec-col{}
.spec-sec{margin-bottom:5px;break-inside:avoid}
.spec-sec-h{background:#1a2332;color:#fff;font-size:6pt;font-weight:700;padding:2px 6px;letter-spacing:.5px}
.spec-sec-h.facade{background:#2471d4}
.spec-sec-h.detail{background:#c8a45c;color:#1a2332}
.spec-tbl{width:100%;border-collapse:collapse;font-size:6pt}
.spec-tbl th,.spec-tbl td{border:0.5px solid #bbb;padding:1.5px 4px;vertical-align:middle}
.spec-tbl th.spec-row-label{background:#f0f2f5;font-weight:700;white-space:nowrap;width:54px;min-width:54px;font-size:5.5pt;color:#333;text-align:left}
.spec-tbl td{min-height:12px}
.spec-tbl td.filled{color:#1a2332;font-weight:600}
.spec-note-box{border:0.5px solid #bbb;padding:3px 6px;font-size:5.5pt;line-height:1.6;margin-top:4px}
.spec-note-title{font-weight:700;margin-bottom:1px}
.spec-empty{color:#aaa;font-style:italic}
.spec-sign{display:flex;justify-content:flex-end;gap:16px;margin-top:5px}
.spec-sign-box{border-top:0.5px solid #999;width:110px;text-align:center;padding-top:2px;font-size:5.5pt;color:#888}
.spec-editable-cell{cursor:text;background:#fffbe6!important}
.spec-info-tbl th,.spec-info-tbl td{border:1px solid #8899aa!important;padding:2px 4px}

/* SUB TABS */
.sub-tab-bar{display:flex;gap:4px;padding:6px 12px 0;background:var(--bg);border-bottom:2px solid var(--border);flex-shrink:0}
.sub-tab-btn{padding:5px 16px;border-radius:8px 8px 0 0;border:1px solid var(--border);border-bottom:none;background:#fff;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;margin-bottom:-2px}
.sub-tab-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.sub-tab-btn:hover:not(.active){color:var(--navy)}

/* FACADE / DETAIL PRESENTATION */
.facade-a3{width:420mm;display:flex;flex-direction:row;gap:5mm;align-items:flex-start;background:#fff;padding:7mm 9mm;box-shadow:0 2px 16px rgba(0,0,0,.12);font-size:7.5pt;line-height:1.45;color:#000;margin-bottom:20px}
.facade-col-left{width:178mm;flex-shrink:0}
.facade-col-right{flex:1;min-width:0}
.detail-floor-section{margin-top:4mm;padding-top:3mm;border-top:1.5px dashed #90b8e8}
.detail-floor-section:first-child{margin-top:0;padding-top:0;border-top:none}
.facade-tbl{width:100%;border-collapse:collapse;font-size:7pt}
.facade-tbl th{background:#1a2332;color:#fff;padding:3px 5px;font-weight:700;white-space:nowrap;font-size:6.5pt}
.facade-tbl.detail-tbl th{background:#2471d4}
.facade-tbl td{border:0.5px solid #aab;padding:0;vertical-align:middle}
.facade-tbl tr:nth-child(even) td{background:#f7f9fc}
.facade-tbl tr:nth-child(odd) td{background:#fff}
.facade-tbl .td-no{text-align:center;padding:2px 3px;color:#888;width:7mm;font-size:6pt}
.facade-tbl .td-label{padding:2px 5px;font-weight:700;color:#1a2332;white-space:nowrap;font-size:6.5pt}
.facade-cell{display:block;outline:none;padding:2px 4px;min-height:12px;width:100%;cursor:text;box-sizing:border-box;font-size:7pt;background:#fffbe6}
.floor-setup{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 20px;gap:20px;min-height:280px}
@media screen{
  .facade-cell:hover{background:#fff3b0}
  .facade-cell:focus{background:#fff;box-shadow:inset 0 0 0 1.5px #c8a45c}
}
@media print{
  .facade-pages-wrap{transform:none!important;margin-bottom:0!important}
  .facade-a3{box-shadow:none;padding:5mm 6mm;width:420mm;page-break-after:always;margin-bottom:0}
  .facade-a3:last-child{page-break-after:auto}
  .facade-col-left{width:178mm}
  .facade-col-right{flex:1}
  .detail-floor-section{border-top:none}
  .facade-cell{cursor:default}
}
.spec-biko{width:52px;min-width:52px;border:0.5px solid #e6c44a;padding:1.5px 3px;cursor:text;vertical-align:top;font-size:5.5pt;color:#555;background:#fffbe6}
.denki-add{width:36px;min-width:36px;border:0.5px solid #e6c44a;padding:1.5px 2px;text-align:center;font-size:5pt;color:var(--blue);font-weight:600;background:#fffbe6}
.denki-total{width:44px;min-width:44px;border:0.5px solid #bbb;padding:1.5px 2px;text-align:center;font-size:5pt;font-weight:700;background:#f0f2f5}
@media screen{
  .spec-editable-cell:hover,.spec-biko:hover,.denki-add:hover{background:#fff3b0!important}
  .spec-editable-cell:focus,.spec-biko:focus,.denki-add:focus{background:#fff!important;outline:1px solid #c8a45c!important}
}

@media print{
  /* ── レイアウト ── */
  .no-print{display:none!important}
  .proposal-inner{box-shadow:none;padding:20px}
  body{background:#fff}
  .proposal{background:#fff}
  .spec-a3{box-shadow:none;padding:4mm 6mm;width:100%}
  .spec-editable-cell,.spec-biko,.denki-add,.facade-cell,
  .k-inp,.k-ta,.fin-inp,.sched-task-inp-row input{
    background:#fff!important;border-color:#bbb!important;cursor:default
  }
  @page{size:A3 landscape;margin:4mm}

  /* ── 背景色・テキスト色を強制印刷（ブラウザのデフォルト抑制を解除） ── */
  .spec-a3,.spec-a3 *{
    -webkit-print-color-adjust:exact!important;
    print-color-adjust:exact!important;
  }

  /* ── セクションヘッダー：B&W印刷で階層が識別できるよう濃度を調整 ── */
  /* 建物構造・断熱・基礎（最上位：最も濃いほぼ黒） */
  .spec-sec-h{background:#111827!important;color:#fff!important}
  /* 外部工事 facade（中位：濃青→グレースケール時に中間濃度） */
  .spec-sec-h.facade{background:#1e4d8c!important;color:#fff!important}
  /* 内部仕上げ detail（下位：濃茶→グレースケール時に中間濃度だが上と区別） */
  .spec-sec-h.detail{background:#6b4500!important;color:#fff!important}

  /* ── 表ラベル列：薄グレーで背景を維持 ── */
  .spec-tbl th.spec-row-label{background:#dce0e8!important;color:#000!important}

  /* ── カート自動反映セル：太字・黒で明確に ── */
  .spec-tbl td.filled{color:#000!important;font-weight:700!important}

  /* ── 電気セクション 追加数量：薄青背景＋黒太字でB&W識別可 ── */
  .denki-add{
    background:#c0d8f0!important;
    color:#000!important;
    font-weight:700!important;
    border:0.5px solid #888!important;
  }

  /* ── 電気セクション 合計数量：中グレー背景＋黒太字 ── */
  .denki-total{
    background:#9ab0c8!important;
    color:#000!important;
    font-weight:700!important;
  }

  /* ── 備考欄：枠線を濃くして印刷で見やすく ── */
  .spec-biko{
    border:0.5px solid #999!important;
    color:#333!important;
  }

  /* ── 仕様書ヘッダー罫線・タイトルカラー ── */
  .spec-hd{border-bottom-color:#000!important}
  .spec-hd-title{color:#000!important}

  /* ── 注意事項・署名欄 ── */
  .spec-note-box{border-color:#888!important}
  .spec-sign-box{border-top-color:#888!important;color:#444!important}
}

/* ===== KARTE TAB ===== */
.karte-wrap{flex:1;overflow-y:auto;background:#f0f2f5;display:flex;flex-direction:column}
.karte-subtabs{display:flex;gap:4px;padding:10px 16px 0;background:#1a2332;flex-shrink:0}
.karte-subtab{padding:6px 14px;border:none;border-radius:6px 6px 0 0;background:#2a3a52;color:#8899aa;font-size:12px;cursor:pointer;font-weight:600;transition:all .15s}
.karte-subtab.active{background:#c8a84b;color:#1a2332}
.karte-body{flex:1;overflow-y:auto;padding:16px}
.k-sec{background:#fff;border-radius:8px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.k-sec-hdr{padding:8px 14px;font-weight:700;font-size:12px;background:#1a2332;color:#c8a84b;letter-spacing:1px}
.k-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.k-field{display:flex;flex-direction:column;padding:6px 10px;border-bottom:1px solid #f0f0f0;border-right:1px solid #f0f0f0}
.k-grid .k-field:nth-child(2n){border-right:none}
.k-label{font-size:9px;color:#888;margin-bottom:2px;font-weight:600}
.k-inp{border:1px solid #e6c44a;border-radius:4px;padding:4px 6px;font-size:11px;width:100%;background:#fffbe6;box-sizing:border-box}
.k-inp:focus{outline:none;border-color:#c8a84b;background:#fff}
.k-ta{border:1px solid #e6c44a;border-radius:4px;padding:4px 6px;font-size:11px;width:100%;background:#fffbe6;resize:vertical;min-height:48px;box-sizing:border-box;font-family:inherit}
.k-ta:focus{outline:none;border-color:#c8a84b;background:#fff}
.k-full{grid-column:1/-1}
.flow-step{background:#fff;border-radius:8px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
.flow-step-hdr{padding:8px 14px;background:linear-gradient(90deg,#1a2332,#2a3a52);color:#c8a84b;font-weight:700;font-size:12px;display:flex;align-items:center;gap:8px}
.flow-step-body{padding:10px 14px;font-size:11px;color:#333;line-height:1.9}
.flow-step-body ul{margin:0;padding-left:18px}
.flow-step-body li{margin-bottom:2px}
.karte-print-sec{background:#fff;border-radius:8px;margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.karte-print-hdr{padding:7px 14px;font-weight:700;font-size:11px;background:#e8f0fe;color:#1a3c6e;border-bottom:2px solid #1a3c6e}
.karte-print-tbl{width:100%;border-collapse:collapse;font-size:10px}
.karte-print-tbl th{background:#f5f5f5;padding:5px 8px;text-align:left;border:1px solid #ddd;font-weight:600;color:#555;width:18%}
.karte-print-tbl td{padding:5px 8px;border:1px solid #ddd;color:#222}

/* ===== SCHEDULE TAB ===== */
.sched-wrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;background:#f0f2f5;display:flex;flex-direction:column;align-items:center}
.sched-doc{background:#fff;width:270mm;padding:8mm 10mm;box-shadow:0 2px 16px rgba(0,0,0,.12);font-size:8pt;color:#000;margin-bottom:20px;font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif}
.sched-hdr{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #1a2332;margin-bottom:5mm;padding-bottom:3mm}
.sched-title-main{font-size:24pt;font-weight:700;letter-spacing:3px;color:#1a2332;line-height:1}
.sched-title-sub{font-size:10pt;font-weight:400;color:#555;margin-left:8px}
.sched-subtitle-txt{font-size:6.5pt;color:#666;margin-top:4px;max-width:150mm}
.sched-cust-info{font-size:7.5pt;text-align:right}
.sched-cust-row{display:flex;justify-content:flex-end;gap:8px;margin-bottom:2px;align-items:center}
.sched-cust-lbl{color:#888;min-width:28px}
.sched-cust-val{font-weight:700;color:#1a2332;max-width:100mm;text-align:right}

/* Meeting table */
.sched-tbl{width:100%;border-collapse:collapse;font-size:6.5pt;margin-bottom:4mm;table-layout:fixed}
.sched-tbl th,.sched-tbl td{border:0.5px solid #999;text-align:center;padding:2px 1px;vertical-align:middle}
.sched-row-lbl{background:#c8b9a4;color:#fff;font-weight:700;width:16mm;font-size:7pt;white-space:nowrap}
.sched-meet-th{background:#c8b9a4;color:#fff;font-weight:700;font-size:6.5pt;line-height:1.3;padding:2px 2px}
.sched-meet-star{color:#f5c842;font-size:7.5pt;margin-top:1px}
.sched-calc-date-wrap{font-size:8.5pt;font-weight:700;line-height:1.4}
.sched-day-bdg{display:inline-block;font-size:6.5pt;border-radius:2px;padding:0 2px;background:#f0f0f0;margin-left:2px}
.sched-day-bdg.sat{background:#dbeafe;color:#1d4ed8}
.sched-day-bdg.sun{background:#fee2e2;color:#dc2626}
.sched-act-cell{height:18px}
.sched-act-txt{font-size:8pt;font-weight:600;color:#1a2332}
.sched-stamp{display:inline-block;width:14px;height:14px;border:0.5px solid #aaa;font-size:7pt;line-height:14px;text-align:center;color:#c00;margin-left:2px;border-radius:50%}
.sched-stamp.done{border-color:#c00;color:#c00;font-weight:700}

/* CHECK section */
.sched-check-sec{border:0.5px solid #bbb;padding:3mm 4mm;margin-bottom:4mm}
.sched-check-ttl{font-size:12pt;font-weight:700;color:#1a2332;margin-bottom:2mm;display:flex;align-items:baseline;gap:8px}
.sched-check-ttl span{font-size:7.5pt;color:#888;font-weight:400}
.sched-check-grid{display:grid;grid-template-columns:1fr 1fr;gap:2.5mm 6mm}
.sched-chk-item{display:flex;align-items:flex-start;gap:4px;font-size:7.5pt;line-height:1.5}
.sched-chk-item input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:#1a2332}
.sched-ari-nashi{display:inline-flex;align-items:center;gap:3px;margin-left:4px;white-space:nowrap}
.sched-ari-nashi label{display:inline-flex;align-items:center;gap:1px;cursor:pointer}

/* Calendar */
.sched-cal-sec{margin-top:2mm}
.sched-cal-ttl{font-size:8pt;font-weight:700;color:#1a2332;border-bottom:0.5px solid #bbb;margin-bottom:2mm;padding-bottom:1mm}
.sched-cal-panel{margin-bottom:4mm;overflow-x:auto}
.sched-cal-tbl{border-collapse:collapse;font-size:5.5pt;white-space:nowrap}
.sched-cal-tbl td,.sched-cal-tbl th{border:0.3px solid #ddd;text-align:center;padding:0;height:13px;min-width:9px;max-width:9px;overflow:hidden;box-sizing:border-box}
.sched-cal-month-span{background:#2c3e50;color:#fff;font-weight:700;font-size:6pt;height:15px;text-align:left;padding-left:3px}
.sched-cal-row-lbl-cell{background:#f5f3ee;font-size:6pt;font-weight:700;white-space:nowrap;min-width:22mm;max-width:22mm;text-align:left;padding:0 3px;border:0.3px solid #bbb}
.sched-cal-datenum{background:#f8f8f8;font-size:5.5pt;color:#333}
.sched-cal-day-cell{font-size:5.5pt}
.sched-cal-day-cell.sat{color:#1d4ed8;background:#eff6ff}
.sched-cal-day-cell.sun{color:#dc2626;background:#fff5f5}
.sched-meet-dot{background:#e2e8f0;font-size:6pt;font-weight:700;color:#c00;line-height:1}
.sched-task-cell{opacity:.8}
.sched-task-start{border-radius:3px 0 0 3px}
.sched-task-end{border-radius:0 3px 3px 0}

/* Task input area */
.sched-task-inputs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;font-size:11px;margin-bottom:6px}
.sched-task-inp-row{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.sched-task-inp-row label{font-size:10px;color:#555;white-space:nowrap;min-width:70px}
.sched-task-inp-row input{width:90px;padding:2px 4px;border:1px solid #e6c44a;border-radius:3px;font-size:10px;background:#fffbe6}

/* Print */
@media print {
  .sched-wrap{background:#fff;padding:0}
  .sched-doc{box-shadow:none;width:100%;padding:4mm 6mm;margin:0}
  .sched-doc,.sched-doc *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .sched-toolbar{display:none!important}
}
/* ===== FINANCE PLAN TAB ===== */
.fin-wrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px;background:#f0f2f5;display:flex;flex-direction:column;align-items:center}
.fin-toolbar{width:297mm;margin-bottom:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.fin-doc{background:#fff;width:297mm;padding:6mm 8mm;box-shadow:0 2px 16px rgba(0,0,0,.12);font-size:7pt;color:#000;margin-bottom:20px}
.fin-doc,.fin-doc *{box-sizing:border-box}
.fin-title{font-size:14pt;font-weight:700;letter-spacing:2px;color:#1a2332;border-bottom:2px solid #1a2332;padding-bottom:2mm;margin-bottom:3mm;display:flex;align-items:baseline;gap:8px}

function loadCustomers() {

}
function newId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// Supabase helper: convert customer object ↔ DB row
function dbCustomer(c) {
  return { id: c.id, name1: c.name1||'', name2: c.name2||'', property: c.property||'',
    coordinator: c.coordinator||'', created_at_str: c.createdAt||'', cart: c.cart||[] };
}
function normalizeCustomer(row) {
  return { id: row.id, name1: row.name1||'', name2: row.name2||'', property: row.property||'',
    coordinator: row.coordinator||'', createdAt: row.created_at_str||'', cart: row.cart||[] };
}
// Sync all per-customer blobs from Supabase → localStorage
async function syncCustomerBlobsFromSupa(custId) {
  const {data} = await supa.from('customer_blobs').select().eq('customer_id', custId);
  if (!data) return;
  const keyMap = { spec:'gc_spec_', schedule:'gc_sched_', finance:'gc_finance_',
    facade:'gc_facade_', skip_cats:'gc_skip_' };
  data.forEach(blob => {
    const prefix = keyMap[blob.type];
    if (prefix) localStorage.setItem(prefix + custId, JSON.stringify(blob.data));
  });
}

  });
}

// Storage management utilities
function getStorageUsage() {
  let total = 0;
  for (let k in localStorage) {
    if (localStorage.hasOwnProperty(k)) {
      total += (localStorage.getItem(k) || '').length + k.length;
    }
  }
  return total; // bytes (approx, UTF-16)
}
function exportAllData() {
  const data = {};
  for (let k in localStorage) {
    if (localStorage.hasOwnProperty(k) && k.startsWith('gc_')) {
      data[k] = localStorage.getItem(k);
    }
  }
  const blob = new Blob([JSON.stringify(data)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'coordinator_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importAllData(file, onDone) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      Object.keys(data).forEach(k => { if (k.startsWith('gc_')) localStorage.setItem(k, data[k]); });
      onDone(true);
    } catch { onDone(false); }
  };
  reader.readAsText(file);
}
function deleteCustomerAllData(custId) {
  const keys = [];
  for (let k in localStorage) {
    if (localStorage.hasOwnProperty(k) &&
        (k === 'gc_spec_'+custId || k === 'gc_facade_'+custId)) {
      keys.push(k);
    }
  }
  keys.forEach(k => localStorage.removeItem(k));
}

function fmtPrice(n) {
  if(n===null||n===undefined) return '-';
  return '¥' + n.toLocaleString('ja-JP');
}

function calcItemTotal(sel) {
  const qty = parseFloat(sel.qty);
  const prod = sel.product;
  if (prod.smallQtyPrice && !isNaN(qty) && qty > 0 && qty <= prod.smallQtyPrice.maxQty) {
    return prod.smallQtyPrice.fixedPrice;
  }
  const unitP = sel.customPrice !== null ? sel.customPrice : (prod.price || 0);
  return unitP * (!isNaN(qty) && qty > 0 ? qty : 1);
}

function LoginScreen() {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  async function handleLogin(e) {
    e.preventDefault();
    setLoading(true); setError('');
    const {error: err} = await supa.auth.signInWithPassword({email, password});
    if (err) { setError('メールアドレスまたはパスワードが正しくありません'); setLoading(false); }
  }
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--navy)'}}>
      <div style={{background:'#fff',borderRadius:14,padding:44,width:360,boxShadow:'0 8px 40px rgba(0,0,0,.4)'}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:26,fontWeight:800,letterSpacing:3,color:'var(--navy)'}}>
            <span style={{color:'var(--gold)'}}>ARCHI</span>
            <span style={{color:'var(--navy)',margin:'0 4px'}}>·</span>
            <span>STYLE</span>
          </div>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:6,letterSpacing:1}}>コーディネートシステム</div>
        </div>
        <form onSubmit={handleLogin}>
          <div className="form-group">
            <label className="form-label">メールアドレス</label>
            <input className="form-input" type="email" value={email}
              onChange={e=>setEmail(e.target.value)} required placeholder="your@email.com" autoFocus/>
          </div>
          <div className="form-group">
            <label className="form-label">パスワード</label>
            <input className="form-input" type="password" value={password}
              onChange={e=>setPassword(e.target.value)} required placeholder="パスワードを入力"/>
          </div>
          {error && <div style={{color:'var(--red)',fontSize:12,marginBottom:12,padding:'6px 10px',background:'#fde8e8',borderRadius:6}}>{error}</div>}
          <button type="submit" className="btn-primary" style={{width:'100%',padding:12,fontSize:14,marginTop:4}} disabled={loading}>
            {loading ? 'ログイン中...' : 'ログイン'}
          </button>
        </form>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('customers');
  const [activeCat, setActiveCat] = useState('all');
  const [tagFilter, setTagFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [cart, setCart] = useState([]);
  const [customerDate, setCustomerDate] = useState(new Date().toISOString().slice(0,10));

  // Customer management
  const [customers, setCustomers] = useState([]);
  const [activeCustomerId, setActiveCustomerId] = useState(null);
  const [showNewForm, setShowNewForm] = useState(false);
  const [deleteTarget, setDeleteTarget] = useState(null);

  // Auth
  const [supaUser, setSupaUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);

  // Admin & product management
  const [isAdmin, setIsAdmin] = useState(false);
  const [showAdminLogin, setShowAdminLogin] = useState(false);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [skipCats, setSkipCats] = useState({});
  const [overrides, setOverrides] = useState(loadOverrides);
  const [customProds, setCustomProds] = useState(loadCustomProds);

  const allProducts = useMemo(() => buildAllProducts(overrides, customProds), [overrides, customProds]);

  const activeCustomer = customers.find(c => c.id === activeCustomerId) || null;

  // Supabase auth init
  useEffect(() => {
    supa.auth.getSession().then(({data:{session}}) => {
      setSupaUser(session?.user || null);
      if (session?.user) initDataFromSupa();
      else setAuthLoading(false);
    });
    const {data:{subscription}} = supa.auth.onAuthStateChange((_e, session) => {
      setSupaUser(session?.user || null);
      if (session?.user) initDataFromSupa();
      else { setAuthLoading(false); setCustomers([]); }
    });
    return () => subscription.unsubscribe();
  }, []);

  async function initDataFromSupa() {
    // Load customers
    const {data: custRows} = await supa.from('customers').select();
    if (custRows?.length) {
      const list = custRows.map(normalizeCustomer);
      setCustomers(list);
      localStorage.setItem('gc_customers', JSON.stringify(list));
    } else {
      // First-time migration from localStorage
      const local = loadCustomers();
      if (local.length) {
        await supa.from('customers').upsert(local.map(dbCustomer));
        setCustomers(local);
      }
    }
    // Load product overrides
    const {data: ov} = await supa.from('prod_overrides').select().eq('id',1).single();
    if (ov?.data && Object.keys(ov.data).length) {
      setOverrides(ov.data);
      localStorage.setItem('gc_prod_overrides', JSON.stringify(ov.data));
    }
    // Load custom products
    const {data: cp} = await supa.from('custom_products').select();
    if (cp?.length) {
      const list = cp.map(r => r.data);
      setCustomProds(list);
      localStorage.setItem('gc_prod_custom', JSON.stringify(list));
    }
    // Load room options
    const {data: rs} = await supa.from('app_settings').select().eq('key','room_opts').single();
    if (rs?.value) localStorage.setItem('gc_room_opts', JSON.stringify(rs.value));
    setAuthLoading(false);
  }

  // Cart save (localStorage + Supabase)
  useEffect(() => {
    if (!activeCustomerId) return;
    setCustomers(prev => {
      const updated = prev.map(c => c.id === activeCustomerId ? {...c, cart} : c);
      saveCustomers(updated);
      supa.from('customers').update({cart}).eq('id', activeCustomerId);
      return updated;
    });
  }, [cart]);

  // Customer CRUD
  const createCustomer = useCallback((data) => {
    const c = { id: newId(), ...data, cart: [], createdAt: new Date().toISOString().slice(0,10) };
    setCustomers(prev => { const u = [...prev, c]; saveCustomers(u); return u; });
    supa.from('customers').insert(dbCustomer(c));
    setShowNewForm(false);
  }, []);
  const updateCustomer = useCallback((id, data) => {
    setCustomers(prev => {
      const u = prev.map(c => c.id===id ? {...c,...data} : c);
      saveCustomers(u);
      const updated = u.find(c => c.id === id);
      if (updated) supa.from('customers').upsert(dbCustomer(updated));
      return u;
    });
  }, []);
  const deleteCustomer = useCallback((id) => {
    setCustomers(prev => { const u = prev.filter(c => c.id!==id); saveCustomers(u); return u; });
    if (activeCustomerId === id) { setActiveCustomerId(null); setCart([]); }
    setDeleteTarget(null);
    supa.from('customers').delete().eq('id', id);
  }, [activeCustomerId]);
  const selectCustomer = useCallback(async (cust) => {
    setActiveCustomerId(cust.id);
    setCart(cust.cart || []);
    setCustomerDate(cust.createdAt || new Date().toISOString().slice(0,10));
    // Sync per-customer blobs from Supabase → localStorage, then load
    await syncCustomerBlobsFromSupa(cust.id);
    setSkipCats(loadSkipCats(cust.id));
    setTab('select');
  }, []);
  const toggleSkip = useCallback((catId) => {
    setSkipCats(prev => {
      const next = {...prev, [catId]: !prev[catId]};
      if (activeCustomerId) saveSkipCats(activeCustomerId, next);
      return next;
    });
  }, [activeCustomerId]);

  // Admin product CRUD
  const adminSaveProduct = useCallback((prod) => {
    if (prod.id && prod.id.startsWith('cp_')) {
      setCustomProds(prev => {
        const exists = prev.find(p => p.id === prod.id);
        const u = exists ? prev.map(p => p.id===prod.id ? prod : p) : [...prev, prod];
        saveCustomProds(u); return u;
      });
    } else if (prod.id) {
      setOverrides(prev => {
        const u = {...prev, [prod.id]: prod};
        saveOverrides(u); return u;
      });
    } else {
      const np = {...prod, id:'cp_'+newId()};
      setCustomProds(prev => { const u=[...prev,np]; saveCustomProds(u); return u; });
    }
  }, []);
  const adminDeleteProduct = useCallback((id) => {
    if (id.startsWith('cp_')) {
      setCustomProds(prev => { const u=prev.filter(p=>p.id!==id); saveCustomProds(u); return u; });
    } else {
      setOverrides(prev => { const u={...prev,[id]:{...(prev[id]||{}),hidden:true}}; saveOverrides(u); return u; });
    }
  }, []);
  const adminRestoreProduct = useCallback((id) => {
    setOverrides(prev => {
      const u = {...prev}; if(u[id]) { delete u[id].hidden; if(!Object.keys(u[id]).length) delete u[id]; }
      saveOverrides(u); return u;
    });
  }, []);

  const cartIds = useMemo(() => new Set(cart.map(c=>c.product.id)), [cart]);

  const filtered = useMemo(() => {
    return allProducts.filter(p => {
      if(activeCat !== 'all' && p.cat !== activeCat) return false;
      if(tagFilter !== 'all' && !p.tags.includes(tagFilter)) return false;
      if(search) {
        const q = search.toLowerCase();
        if(!p.name.toLowerCase().includes(q) && !p.maker.toLowerCase().includes(q) && !p.catName.toLowerCase().includes(q)) return false;
      }
      return true;
    });
  }, [allProducts, activeCat, tagFilter, search]);

  const grouped = useMemo(() => {
    const g = {};
    filtered.forEach(p => {
      if(!g[p.cat]) g[p.cat] = {catName:p.catName, group:p.group, items:[]};
      g[p.cat].items.push(p);
    });
    return g;
  }, [filtered]);

  const addToCart = useCallback((product) => {
    if(cartIds.has(product.id)) return;
    const defaultQty = product.priceType === 'fixed' ? 1 : '';
    setCart(prev => [...prev, {
      id: Date.now() + Math.random(),
      product,
      qty: defaultQty,
      unit: product.unit,
      selectedColors: [],
      selectedModels: [],
      customPrice: null,
      note: '',
    }]);
  }, [cartIds]);
  const removeFromCart = useCallback((selId) => {
    setCart(prev => prev.filter(s => s.id !== selId));
  }, []);
  const updateSel = useCallback((selId, field, val) => {
    setCart(prev => prev.map(s => s.id === selId ? {...s, [field]: val} : s));
  }, []);

  const totals = useMemo(() => {
    let subtotal = 0, priceable = 0;
    cart.forEach(s => {
      const q = parseFloat(s.qty);
      if (s.qty !== '' && !isNaN(q) && q > 0) {
        const t = calcItemTotal(s);
        if (t > 0) { subtotal += t; priceable++; }
      }
    });
    return {subtotal, priceable};
  }, [cart]);

  const catCounts = useMemo(() => {
    const c = {};
    allProducts.forEach(p => { c[p.cat] = (c[p.cat]||0) + 1; });
    return c;
  }, [allProducts]);

  const realCats = useMemo(() =>
    CATEGORIES.filter(c => c.group !== 'all' && c.group !== 'header-facade' && c.group !== 'header-detail'),
  []);
  const catsDone = useMemo(() =>
    realCats.filter(c => skipCats[c.id] || cart.some(s => s.product.cat === c.id)),
  [realCats, skipCats, cart]);
  const allDone = catsDone.length === realCats.length;

  const custName = activeCustomer
    ? activeCustomer.name1 + (activeCustomer.name2 ? ` / ${activeCustomer.name2}` : '')
    : '';

  if (authLoading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--navy)'}}>
      <div style={{color:'#fff',fontSize:14,opacity:.7}}>読み込み中...</div>
    </div>
  );
  if (!supaUser) return <LoginScreen/>;

  return (
    <div className="app">
      {/* HEADER */}
      <header className="header no-print">
        <button className="hbg-btn" onClick={()=>setSidebarOpen(o=>!o)}>☰</button>
        <div className="header-logo">
          <span className="logo-n">ARCHI</span>
          <span className="logo-sep">·</span>
          <span className="logo-c">STYLE</span>
        </div>
        <div className="header-customer">
          {activeCustomer ? (
            <>
              <span style={{fontSize:12,color:'#8899aa'}}>選択中：</span>
              <span style={{fontSize:13,fontWeight:700,color:'#fff',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{custName}</span>
              {activeCustomer.property && <span style={{fontSize:11,color:'var(--gold)',marginLeft:4}}>{activeCustomer.property}</span>}
            </>
          ) : (
            <span style={{fontSize:12,color:'#8899aa'}}>お客様が未選択です</span>
          )}
          <input type="date" className="header-select" value={customerDate} onChange={e=>setCustomerDate(e.target.value)} style={{marginLeft:8}}/>
          {isAdmin
            ? <button className="admin-btn on" onClick={()=>setIsAdmin(false)}>🔓 管理者モード解除</button>
            : <button className="admin-btn" onClick={()=>setShowAdminLogin(true)}>🔑 管理者</button>
          }
          <button className="admin-btn" onClick={()=>setShowSettings(true)}>⚙️ 設定</button>
          <button className="admin-btn" onClick={()=>supa.auth.signOut()}
            style={{color:'#e57373',borderColor:'#e57373'}}>🚪 ログアウト</button>
        </div>
      </header>

      {/* NAV SIDEBAR */}
      {sidebarOpen && <div className="nav-sb-overlay no-print" onClick={()=>setSidebarOpen(false)}/>}
      <nav className={`nav-sb no-print${sidebarOpen?' open':''}`}>
        <div className="nav-sb-hdr">
          <span className="nav-sb-logo">ARCHI·STYLE</span>
          <button className="nav-sb-close" onClick={()=>setSidebarOpen(false)}>×</button>
        </div>
        <div className="nav-sb-body">
          {[
            {key:'customers', label:'👥 お客様リスト'},
            {key:'karte',     label:'📋 顧客情報'},
            {key:'schedule',  label:'📅 スケジュール'},
            {key:'select',    label:'🛒 商品選択'},
            {key:'proposal',  label:'📄 オプション金額リスト'},
            {key:'spec',      label:'📝 仕様書'},
            {key:'finance',   label:'💰 資金計画書'},
          ].map(({key,label}) => (
            <div key={key} className={`nav-sb-item${tab===key?' active':''}`}
              onClick={()=>{setTab(key);setSidebarOpen(false);}}>
              {label}
            </div>
          ))}
          {isAdmin && (
            <div className={`nav-sb-item${tab==='admin'?' active':''}`}
              onClick={()=>{setTab('admin');setSidebarOpen(false);}}>
              ⚙️ 商品管理
            </div>
          )}
        </div>
      </nav>

      {/* SETTINGS MODAL */}
      {showSettings && <SettingsPanel onClose={()=>setShowSettings(false)}/>}

      {/* ADMIN LOGIN MODAL */}
      {showAdminLogin && (
        <AdminLoginModal onLogin={(ok)=>{ setIsAdmin(ok); setShowAdminLogin(false); if(ok) setTab('admin'); }} onClose={()=>setShowAdminLogin(false)}/>
      )}

      {/* DELETE CONFIRM MODAL */}
      {deleteTarget && (
        <div className="modal-overlay" onClick={()=>setDeleteTarget(null)}>
          <div className="del-confirm" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:22,marginBottom:6}}>🗑️</div>
            <div style={{fontSize:13,fontWeight:700,color:'var(--red)'}}>本当に削除しますか？</div>
            <div className="del-confirm-name">
              {deleteTarget.name1}{deleteTarget.name2 ? ` / ${deleteTarget.name2}` : ''} 様
              {deleteTarget.property && <span style={{fontSize:12,color:'var(--muted)',marginLeft:8}}>({deleteTarget.property})</span>}
            </div>
            <div className="del-confirm-msg">この操作は元に戻せません。選択した商品リストも含めて完全に削除されます。</div>
            <div className="modal-actions">
              <button className="btn-secondary" onClick={()=>setDeleteTarget(null)}>キャンセル</button>
              <button className="btn-danger" onClick={()=>deleteCustomer(deleteTarget.id)}>削除する</button>
            </div>
          </div>
        </div>
      )}

      {/* NEW CUSTOMER MODAL */}
      {showNewForm && <CustomerFormModal onSave={createCustomer} onClose={()=>setShowNewForm(false)}/>}

      {/* CUSTOMER LIST TAB */}
      {tab === 'customers' && (
        <CustomerListTab customers={customers} activeCustomerId={activeCustomerId}
          onSelect={selectCustomer} onUpdate={updateCustomer} onDelete={setDeleteTarget} onNew={()=>setShowNewForm(true)}/>
      )}

      {/* ADMIN TAB */}
      {tab === 'admin' && isAdmin && (
        <AdminPanel allProducts={allProducts} categories={CATEGORIES} overrides={overrides}
          onSave={adminSaveProduct} onDelete={adminDeleteProduct} onRestore={adminRestoreProduct}/>
      )}

      {/* SELECT TAB */}
      {tab === 'select' && (
        <div className="body">
          {/* CATEGORY SIDEBAR */}
          <nav className="sidebar no-print">
            {/* 進捗サマリー */}
            <div className="sel-prog-wrap">
              <div className="sel-prog-row">
                <span style={{color:'#8899aa'}}>打ち合わせ進捗</span>
                <span style={{color: allDone ? '#6ee7b7' : '#fff', fontWeight:700}}>{catsDone.length}/{realCats.length}</span>
              </div>
              <div className="sel-prog-track">
                <div className="sel-prog-fill" style={{width:(catsDone.length/realCats.length*100)+'%', background: allDone ? '#38a169' : 'var(--gold)'}}/>
              </div>
            </div>
            <div className="sidebar-group">
              <div className={`sidebar-item${activeCat==='all'?' active':''}`} onClick={()=>setActiveCat('all')}>
                すべて表示 <span className="ct">{allProducts.length}</span>
              </div>
            </div>
            {CATEGORIES.filter(c=>c.group!=='all').map(c=>{
              if(c.group==='header-facade') return <div key={c.id} className="sidebar-grouplabel facade">{c.name}</div>;
              if(c.group==='header-detail') return <div key={c.id} className="sidebar-grouplabel detail">{c.name}</div>;
              const hasProduct = cart.some(s => s.product.cat === c.id);
              const skipped = skipCats[c.id];
              const done = hasProduct || skipped;
              return (
                <div key={c.id} className={`sidebar-item${activeCat===c.id?' active':''}`} onClick={()=>setActiveCat(c.id)}>
                  <span style={{flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</span>
                  {done
                    ? <span className={skipped ? 'sel-badge-skip' : 'sel-badge-done'}>{skipped ? '☑' : '✓'}</span>
                    : <span className="ct">{catCounts[c.id]||0}</span>
                  }
                </div>
              );
            })}
          </nav>

          {/* MAIN CONTENT */}
          <div className="main">
            {/* 進捗バー */}
            <div className="no-print" style={{padding:'7px 16px',background:'#fff',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:3}}>
                  <span style={{color:'var(--muted)'}}>仕様打ち合わせ進捗</span>
                  <span style={{fontWeight:700,color: allDone ? 'var(--green)' : 'var(--text)'}}>
                    {catsDone.length} / {realCats.length} カテゴリ完了
                  </span>
                </div>
                <div style={{height:5,background:'#e2e8f0',borderRadius:3,overflow:'hidden'}}>
                  <div style={{height:'100%',width:(catsDone.length/realCats.length*100)+'%',
                    background: allDone ? 'var(--green)' : 'var(--blue)',borderRadius:3,transition:'width .4s'}}/>
                </div>
              </div>
              {allDone && <span style={{color:'var(--green)',fontWeight:700,fontSize:12,whiteSpace:'nowrap'}}>🎉 打ち合わせ完了！</span>}
            </div>

            {/* 検索・フィルター */}
            <div className="search-bar no-print">
              <input className="search-input" placeholder="🔍 商品名・メーカーで検索..." value={search} onChange={e=>setSearch(e.target.value)}/>
              <div className="filter-tags">
                {[['all','ALL'],['std','標準'],['op','OP'],['hit','HIT!']].map(([v,l])=>(
                  <button key={v} className={`ftag ${v}${tagFilter===v?' active':''}`} onClick={()=>setTagFilter(v)}>{l}</button>
                ))}
              </div>
            </div>

            {/* 商品リスト */}
            <div className="products">
              {Object.keys(grouped).length === 0 && (
                <div style={{textAlign:'center',padding:'60px',color:'var(--muted)'}}>
                  <div style={{fontSize:40,marginBottom:10}}>🔍</div>
                  <div>該当する商品が見つかりませんでした</div>
                </div>
              )}
              {Object.entries(grouped).map(([catKey, {catName, group, items}]) => {
                const hasProduct = cart.some(s => s.product.cat === catKey);
                const skipped = skipCats[catKey];
                const done = hasProduct || skipped;
                return (
                  <div key={catKey}>
                    <div className="cat-title">
                      <span>{catName}</span>
                      <span className={`group-badge ${group}`}>{group==='facade'?'外部':'内部'}</span>
                      <span style={{marginLeft:6,fontSize:11,opacity:.7}}>{items.length}件</span>
                      <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6}}>
                        {done && (
                          <span style={{fontSize:10,fontWeight:700,
                            color: skipped ? '#e67e22' : '#6ee7b7',
                            background: skipped ? 'rgba(230,126,34,.2)' : 'rgba(39,174,96,.25)',
                            padding:'1px 8px',borderRadius:8}}>
                            {skipped ? '☑ 選択しない' : '✓ 選択済'}
                          </span>
                        )}
                        <button className={`skip-btn${skipped?' skipped':''}`}
                          onClick={e=>{e.stopPropagation();toggleSkip(catKey);}}>
                          {skipped ? '✕ スキップ解除' : '選択しない'}
                        </button>
                      </div>
                    </div>
                    <div className={`prod-list${skipped?' prod-list-skipped':''}`}>
                      {items.map(p => (
                        <ProductRow key={p.id} product={p} inCart={cartIds.has(p.id)} onAdd={addToCart} disabled={!!skipped}/>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* CART */}
          <CartPanel
            cart={cart}
            totals={totals}
            onRemove={removeFromCart}
            onUpdate={updateSel}
            onClear={()=>setCart([])}
            onProposal={()=>setTab('proposal')}
            onSpec={()=>setTab('spec')}
            allDone={allDone}
            catsDone={catsDone.length}
            totalCats={realCats.length}
          />
        </div>
      )}

      {/* PROPOSAL TAB */}
      {tab === 'proposal' && (
        <div className="proposal active">
          <div className="no-print" style={{maxWidth:800,margin:'0 auto 16px',display:'flex',gap:10,alignItems:'center'}}>
            <button className="print-btn" onClick={()=>window.print()}>🖨 印刷 / PDF保存</button>
            <button onClick={()=>setTab('select')} style={{padding:'8px 16px',border:'1px solid var(--border)',borderRadius:6,background:'#fff',cursor:'pointer',fontSize:12}}>← 選択画面に戻る</button>
            <button onClick={()=>setTab('spec')} style={{padding:'8px 16px',border:'1px solid var(--border)',borderRadius:6,background:'#fff',cursor:'pointer',fontSize:12}}>📝 仕様書へ →</button>
          </div>
          <ProposalView
            cart={cart}
            customerName={custName}
            customerName2={activeCustomer?.name2 || ''}
            property={activeCustomer?.property || ''}
            coordinator={activeCustomer?.coordinator || ''}
            date={customerDate}
            totals={totals}
          />
        </div>
      )}

      {/* KARTE TAB */}
      {tab === 'karte' && (
        <KarteTab
          key={activeCustomer?.id || 'default'}
          activeCustomer={activeCustomer}
        />
      )}

      {/* SCHEDULE TAB */}
      {tab === 'schedule' && (
        <ScheduleTab
          key={activeCustomer?.id || 'default'}
          activeCustomer={activeCustomer}
        />
      )}

      {/* FINANCE TAB */}
      {tab === 'finance' && (
        <FinancePlanTab
          key={activeCustomer?.id || 'default'}
          activeCustomer={activeCustomer}
        />
      )}

      {/* SPEC SHEET TAB */}
      {tab === 'spec' && (
        <SpecTabWrapper
          key={activeCustomer?.id || 'default'}
          cart={cart}
          activeCustomer={activeCustomer}
          customerDate={customerDate}
        />
      )}
    </div>
  );
}

// ===== ADMIN COMPONENTS =====

function AdminLoginModal({onLogin, onClose}) {
  const [pw, setPw] = React.useState('');
  const [err, setErr] = React.useState(false);
  const submit = () => {
    if(pw === getAdminPw()) { onLogin(true); }
    else { setErr(true); setPw(''); }
  };
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">🔑 管理者ログイン</div>
        <div className="form-group">
          <label className="form-label">パスワード</label>
          <input className="form-input" type="password" value={pw}
            onChange={e=>{setPw(e.target.value);setErr(false);}}
            onKeyDown={e=>e.key==='Enter'&&submit()}
            autoFocus placeholder="パスワードを入力"/>
          {err && <div style={{color:'var(--red)',fontSize:11,marginTop:4}}>パスワードが正しくありません</div>}
        </div>
        <div className="modal-actions">
          <button className="btn-secondary" onClick={onClose}>キャンセル</button>
          <button className="btn-primary" onClick={submit}>ログイン</button>
        </div>
      </div>
    </div>
  );
}

function ProductEditModal({product, onSave, onClose}) {
  const isNew = !product.id;
  const [form, setForm] = React.useState({
    id: product.id || '',
    cat: product.cat || '',
    catName: product.catName || '',
    group: product.group || 'detail',
    name: product.name || '',
    maker: product.maker || '',
    priceType: product.priceType || 'fixed',
    price: (product.price !== null && product.price !== undefined) ? product.price : '',
    unit: product.unit || '式',
    priceText: product.priceText || '',
    note: product.note || '',
    colors: product.colors ? [...product.colors] : [],
    models: product.models ? product.models.map(m => typeof m === 'string' ? {no:'',name:m} : {...m}) : [],
  });
  const [newColor, setNewColor] = React.useState('');
  const [newModelNo, setNewModelNo] = React.useState('');
  const [newModelName, setNewModelName] = React.useState('');
  const [newPw, setNewPw] = React.useState('');
  const [newPwConfirm, setNewPwConfirm] = React.useState('');
  const [pwMsg, setPwMsg] = React.useState('');

  const setF = (k,v) => setForm(f=>({...f,[k]:v}));
  const addColor = () => { if(newColor.trim()) { setF('colors',[...form.colors,newColor.trim()]); setNewColor(''); } };
  const removeColor = (i) => setF('colors', form.colors.filter((_,idx)=>idx!==i));
  const addModel = () => {
    if(newModelName.trim()) {
      setF('models',[...form.models,{no:newModelNo.trim(),name:newModelName.trim()}]);
      setNewModelNo(''); setNewModelName('');
    }
  };
  const removeModel = (i) => setF('models', form.models.filter((_,idx)=>idx!==i));
  const updateModelField = (i,k,v) => setF('models', form.models.map((m,idx)=>idx===i?{...m,[k]:v}:m));

  const handleSave = () => {
    if(!form.name.trim()) { alert('商品名を入力してください'); return; }
    const prod = {
      ...form,
      price: form.price !== '' ? Number(form.price) : null,
      colors: form.colors.length > 0 ? form.colors : undefined,
      models: form.models.length > 0 ? form.models : undefined,
      lines: product.lines || ['lacie','hours','lifeplus','life'],
      tags: product.tags || ['op'],
    };
    if(!prod.id) delete prod.id;
    onSave(prod);
  };

  const handlePwChange = () => {
    if(!newPw) return;
    if(newPw !== newPwConfirm) { setPwMsg('パスワードが一致しません'); return; }
    if(newPw.length < 4) { setPwMsg('4文字以上で設定してください'); return; }
    setAdminPw(newPw);
    setNewPw(''); setNewPwConfirm('');
    setPwMsg('パスワードを変更しました');
    setTimeout(()=>setPwMsg(''),3000);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal wide" onClick={e=>e.stopPropagation()} style={{maxHeight:'90vh',overflowY:'auto'}}>
        <div className="modal-title">{isNew ? '＋ 新規商品追加' : '✏️ 商品編集'}</div>

        <div className="form-row">
          <div className="form-group" style={{flex:2}}>
            <label className="form-label">商品名 *</label>
            <input className="form-input" value={form.name} onChange={e=>setF('name',e.target.value)} placeholder="商品名"/>
          </div>
          <div className="form-group" style={{flex:1}}>
            <label className="form-label">グループ</label>
            <select className="form-input" value={form.group} onChange={e=>setF('group',e.target.value)}>
              <option value="facade">FACADE</option>
              <option value="detail">DETAIL</option>
            </select>
          </div>
        </div>

        <div className="form-row">
          <div className="form-group" style={{flex:2}}>
            <label className="form-label">メーカー</label>
            <input className="form-input" value={form.maker} onChange={e=>setF('maker',e.target.value)} placeholder="メーカー名"/>
          </div>
          <div className="form-group" style={{flex:2}}>
            <label className="form-label">カテゴリ名</label>
            <input className="form-input" value={form.catName} onChange={e=>setF('catName',e.target.value)} placeholder="カテゴリ名"/>
          </div>
        </div>

        <div className="form-row">
          <div className="form-group" style={{flex:1}}>
            <label className="form-label">価格区分</label>
            <select className="form-input" value={form.priceType} onChange={e=>setF('priceType',e.target.value)}>
              <option value="fixed">固定（カ所/式）</option>
              <option value="perUnit">面積系（㎡/m/坪）</option>
              <option value="included">標準内</option>
              <option value="estimate">見積もり</option>
            </select>
          </div>
          <div className="form-group" style={{flex:1}}>
            <label className="form-label">単価（円）</label>
            <input className="form-input" type="number" value={form.price} onChange={e=>setF('price',e.target.value)} placeholder="例: 50000"/>
          </div>
          <div className="form-group" style={{flex:1}}>
            <label className="form-label">単位</label>
            <input className="form-input" value={form.unit} onChange={e=>setF('unit',e.target.value)} placeholder="例: 式, ㎡, カ所"/>
          </div>
        </div>

function AdminPanel({allProducts, categories, overrides, onSave, onDelete, onRestore}) {
  const [search, setSearch] = React.useState('');
  const [editTarget, setEditTarget] = React.useState(null);

  const grouped = React.useMemo(() => {
    const g = {};
    allProducts.forEach(p => {
      if(search) {
        const q = search.toLowerCase();
        if(!p.name.toLowerCase().includes(q) && !p.catName.toLowerCase().includes(q) && !p.maker.toLowerCase().includes(q)) return;
      }
      if(!g[p.cat]) g[p.cat] = {catName:p.catName, group:p.group, items:[]};
      g[p.cat].items.push(p);
    });
    return g;
  }, [allProducts, search]);

  const hiddenProds = React.useMemo(() => {
    return PRODUCTS.filter(p => overrides[p.id]?.hidden);
  }, [overrides]);

  return (
    <div className="admin-tab">
      <div className="admin-toolbar">
        <input className="admin-search" placeholder="商品名・カテゴリ・メーカーで検索..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <button className="admin-add-btn" onClick={()=>setEditTarget({})}>＋ 新規追加</button>
      </div>

      {hiddenProds.length > 0 && (
        <div className="admin-cat-block" style={{borderColor:'var(--red)',background:'#fff8f8',marginBottom:12}}>
          <div className="admin-cat-header" style={{background:'#fde8e8'}}>
            <span className="admin-cat-title" style={{color:'var(--red)'}}>🚫 非表示中の商品 ({hiddenProds.length}件)</span>
          </div>
          {hiddenProds.map(p => (
            <div key={p.id} className="admin-prod-row">
              <span className="admin-prod-name" style={{color:'var(--muted)',textDecoration:'line-through'}}>{p.name}</span>
              <span className="admin-prod-price">{p.priceText||'-'}</span>
              <button className="ap-edit" style={{color:'var(--green)',borderColor:'var(--green)'}} onClick={()=>onRestore(p.id)}>復元</button>
            </div>
          ))}
        </div>
      )}

      {Object.entries(grouped).map(([cat, {catName, group, items}]) => (
        <div key={cat} className="admin-cat-block">
          <div className="admin-cat-header">
            <span className="admin-cat-title">{catName}</span>
            <span style={{fontSize:11,color:'var(--muted)'}}>{items.length}件</span>
          </div>
          {items.map(p => (
            <div key={p.id} className="admin-prod-row">
              <span className="admin-prod-name">{p.name}</span>
              {p.id && p.id.startsWith('cp_') && <span className="admin-prod-custom">カスタム</span>}
              {overrides[p.id] && p.id && !p.id.startsWith('cp_') && <span className="admin-prod-custom" style={{background:'#fff3e0',color:'#c77600'}}>編集済</span>}
              <span className="admin-prod-price">{p.priceText||'-'}</span>
              <button className="ap-edit" onClick={()=>setEditTarget(p)}>編集</button>
              <button className="ap-del" onClick={()=>{ if(window.confirm(`「${p.name}」を削除しますか？`)) onDelete(p.id); }}>削除</button>
            </div>
          ))}
        </div>
      ))}

      {editTarget && (
        <ProductEditModal product={editTarget} onSave={(prod)=>{onSave(prod);setEditTarget(null);}} onClose={()=>setEditTarget(null)}/>
      )}
    </div>
  );
}

function CustomerListTab({customers, activeCustomerId, onSelect, onUpdate, onDelete, onNew}) {
  const [custSearch, setCustSearch] = useState('');
  const [editingId, setEditingId] = useState(null);

  const sorted = useMemo(() => {
    const q = custSearch.toLowerCase();
    return [...customers]
      .filter(c => !q || c.name1?.toLowerCase().includes(q) || c.name2?.toLowerCase().includes(q) || c.property?.toLowerCase().includes(q))
      .sort((a,b) => (a.name1||'').localeCompare(b.name1||'', 'ja'));
  }, [customers, custSearch]);

  return (
    <div className="cust-tab">
      <div className="cust-toolbar">
        <input className="cust-search" placeholder="🔍 お客様名・物件名で検索..." value={custSearch} onChange={e=>setCustSearch(e.target.value)}/>
        <span className="cust-count">{sorted.length}件</span>
        <button className="cust-new-btn" onClick={onNew}>＋ 新規お客様登録</button>
      </div>

        <div className="cust-empty">

        </div>
      ) : (
        <div className="cust-grid">
          {sorted.map(c => (
            editingId === c.id
              ? <CustomerEditCard key={c.id} customer={c} onSave={(data)=>{onUpdate(c.id,data);setEditingId(null);}} onCancel={()=>setEditingId(null)}/>
              : <CustomerCard key={c.id} customer={c} isActive={c.id===activeCustomerId} onSelect={onSelect} onEdit={()=>setEditingId(c.id)} onDelete={onDelete}/>

function CartItem({sel, onRemove, onUpdate}) {
  const p = sel.product;
  const isArea = p.priceType === 'perUnit';
  const isCount = p.priceType === 'fixed';
  const unitPrice = sel.customPrice !== null ? sel.customPrice : (p.price || 0);
  const qty = parseFloat(sel.qty);
  const useSmallFixed = p.smallQtyPrice && sel.qty !== '' && !isNaN(qty) && qty > 0 && qty <= p.smallQtyPrice.maxQty;
  const total = (isArea || isCount) && sel.qty !== '' && !isNaN(qty) && qty > 0
    ? calcItemTotal(sel) : null;

  return (
    <div className="cart-item">
      <button className="ci-remove" onClick={()=>onRemove(sel.id)}>×</button>
      <div className="ci-name">{p.name}</div>
      <div className="ci-maker">{p.maker}</div>

      {p.colors && p.colors.length > 0 && (
        <div className="ci-select-group">
          <div className="ci-select-label">カラー選択</div>
          <div className="ci-checkbox-list">
            {p.colors.map(c => {
              const checked = (sel.selectedColors||[]).includes(c);
              return (
                <label key={c} className={`ci-chk-item${checked?' checked':''}`}>
                  <input type="checkbox" checked={checked} onChange={()=>{
                    const cur = sel.selectedColors||[];
                    onUpdate(sel.id,'selectedColors', checked ? cur.filter(x=>x!==c) : [...cur,c]);
                  }}/>
                  {c}
                </label>
              );
            })}
          </div>
        </div>
      )}

      {p.models && p.models.length > 0 && (
        <div className="ci-select-group">
          <div className="ci-select-label">商品・品番選択</div>
          <div className="ci-checkbox-list">
            {p.models.map(m => {
              const key = m.no ? `${m.no}:${m.name}` : m.name;
              const checked = (sel.selectedModels||[]).includes(key);
              return (
                <label key={key} className={`ci-chk-item${checked?' checked':''}`}>
                  <input type="checkbox" checked={checked} onChange={()=>{
                    const cur = sel.selectedModels||[];
